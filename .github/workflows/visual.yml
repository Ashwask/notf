name: Visual Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Regenerate baselines (uploads as artifact)'
        type: boolean
        default: false

jobs:
  visual:
    name: Playwright visual + a11y
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run visual + a11y suite
        run: |
          if [ "${{ inputs.update_snapshots }}" = "true" ]; then
            npx playwright test --update-snapshots
          else
            npx playwright test
          fi
        env:
          CI: 'true'
          NOTF_STRICT_OVERFLOW: '1'
          NOTF_STRICT_TAP: '1'

      - name: Upload regenerated snapshots
        if: inputs.update_snapshots == true
        uses: actions/upload-artifact@v4
        with:
          name: linux-snapshots
          path: website/tests/visual/**/*-snapshots/**
          retention-days: 7

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: website/playwright-report
          retention-days: 14

      - name: Upload diff screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: website/test-results
          retention-days: 14
