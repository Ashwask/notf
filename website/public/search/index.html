<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Moved | NOTF</title>
    <meta http-equiv="refresh" content="3;url=/">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        .message-container {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            margin: 2rem;
        }

        .icon {
            font-size: 4rem;
            color: #FBC831;
            margin-bottom: 1.5rem;
        }

        h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .redirect-info {
            color: #999;
            font-size: 0.9rem;
            font-style: italic;
        }

        a.btn {
            display: inline-block;
            background: #23A2A5;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        a.btn:hover {
            background: #0D7576;
        }
    </style>
</head>
<body>
    <div class="message-container">
        <div class="icon">
            <i class="fa-solid fa-robot"></i>
        </div>
        <h1>Search Has Moved</h1>
        <p>We've replaced the traditional search with our smart chatbot assistant. Use the chatbot on the homepage to discover communities and resources.</p>
        <p class="redirect-info">Redirecting you to the homepage in 3 seconds...</p>
        <a href="/" class="btn">Go to Homepage Now</a>
    </div>
</body>
</html>
