<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NOTF | NOTF</title>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/pages/admin-login.css">

</head>
<body>
    <div id="notf-header"></div>
    <script src="/assets/js/components/header.js"></script>
<main>
        
<section class="admin-login">
    <div class="login-container">
        <div class="login-card">
            <h1 style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <i class="fa-solid fa-lock" style="font-size: 1.75rem;"></i>
                NOTF Admin
            </h1>
            <p class="subtitle">Secure administrator access</p>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        autocomplete="email"
                        placeholder="admin@notf.org"
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        autocomplete="current-password"
                        placeholder="Enter your password"
                    />
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>

                <button type="submit" class="btn-primary btn-login" id="loginBtn">
                    <span id="loginBtnText">Sign In</span>
                    <span id="loginBtnLoader" class="loader" style="display: none;">
                        <i class="fa-solid fa-spinner fa-spin"></i>
                    </span>
                </button>
            </form>

            <div class="login-footer">
                <p><a href="/">← Back to NOTF Home</a></p>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/admin/auth.js"></script>
<script>
// Check if already logged in
(async function() {
    const session = await authUtils.checkAuth();
    if (session) {
        window.location.href = '/admin/index.html';
    }
})();

// Handle login form submission
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMessage = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');
    const loginBtnText = document.getElementById('loginBtnText');
    const loginBtnLoader = document.getElementById('loginBtnLoader');

    // Show loading state
    loginBtn.disabled = true;
    loginBtnText.style.display = 'none';
    loginBtnLoader.style.display = 'inline-block';
    errorMessage.style.display = 'none';

    try {
        await authUtils.login(email, password);
        // Redirect to dashboard on success
        window.location.href = '/admin/index.html';
    } catch (error) {
        // Show error message
        errorMessage.textContent = error.message || 'Invalid email or password';
        errorMessage.style.display = 'block';

        // Reset button state
        loginBtn.disabled = false;
        loginBtnText.style.display = 'inline';
        loginBtnLoader.style.display = 'none';
    }
});
</script>

    </main>
    
    <div id="notf-footer"></div>
    <script src="/assets/js/components/footer.js"></script>

</body>
</html>
