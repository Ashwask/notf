<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Stories - NOTF Admin | NOTF</title>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body style="margin: 0; padding: 0; background: transparent;">
    <main>

<link rel="stylesheet" href="/assets/admin/admin.css">

<section class="admin-page">
    <div class="admin-container">
        <div class="page-header minimal">
            <h1><i class="fa-solid fa-book-open" style="color: #C45A2A;"></i> Stories <span id="adminStoryCount" style="font-size: 0.7em; color: #B9C98A; font-weight: 500;">(0)</span></h1>
            <div class="icon-actions">
                <button class="icon-btn primary" onclick="showCreateForm()">
                    <i class="fa-solid fa-plus"></i>
                    <span>Add New</span>
                </button>
                <button class="icon-btn" onclick="loadStories()">
                    <i class="fa-solid fa-arrows-rotate"></i>
                    <span>Refresh</span>
                </button>
            </div>
        </div>

        <div class="search-bar minimal">
            <div class="minimal-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search stories..." />
            </div>
            <div class="filter-chips">
                <button class="chip" data-status="active" onclick="setStatusFilter('active', this)">
                    <i class="fa-solid fa-circle-check"></i>
                    Active
                </button>
                <button class="chip" data-status="draft" onclick="setStatusFilter('draft', this)">
                    <i class="fa-regular fa-file"></i>
                    Draft
                </button>
                <button class="chip active" data-status="all" onclick="setStatusFilter('all', this)">
                    <i class="fa-solid fa-list"></i>
                    All
                </button>
            </div>
        </div>

        <div id="storiesList" class="organizations-list minimal">
            <p class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading stories...</p>
        </div>

        <!-- Create/Edit Modal -->
        <div id="formModal" class="modal" style="display: none;">
            <div class="modal-content" style="max-width: 900px;">
                <div class="modal-header" id="formModalHeader">
                    <div class="drag-handle" title="Drag to move">
                        <i class="fa-solid fa-grip-vertical"></i>
                    </div>
                    <div style="flex: 1;">
                        <h2 id="modalTitle">Add Story</h2>
                    </div>
                    <button onclick="closeModal()" class="btn-close">&times;</button>
                </div>
                <form id="storyForm" class="organization-form">
                    <input type="hidden" id="storyId" />
                    <input type="hidden" id="storyFilePath" />

                    <div class="form-row">
                        <div class="form-group full">
                            <label for="storyTitle">Story Title *</label>
                            <input type="text" id="storyTitle" required placeholder="e.g., Rethinking Urban Waste" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="storyCity">City *</label>
                            <select id="storyCity" required>
                                <option value="">Select a city</option>
                                <option value="Bengaluru">Bengaluru</option>
                                <option value="Mumbai">Mumbai</option>
                                <option value="Chennai">Chennai</option>
                                <option value="Hyderabad">Hyderabad</option>
                                <option value="Pune">Pune</option>
                                <option value="Kolkata">Kolkata</option>
                                <option value="Ahmedabad">Ahmedabad</option>
                                <option value="Kochi">Kochi</option>
                                <option value="Visakhapatnam">Visakhapatnam</option>
                                <option value="Jaipur">Jaipur</option>
                                <option value="Gurugram">Gurugram</option>
                                <option value="Thane">Thane</option>
                                <option value="Bhubaneswar">Bhubaneswar</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="storyCommunity">Community</label>
                            <input type="text" id="storyCommunity" placeholder="Type community name or select" list="communityList" />
                            <datalist id="communityList"></datalist>
                            <small style="color: var(--color-text-light); font-size: 0.85rem;">Type a community name. Existing communities will auto-suggest.</small>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="storyLocation">Location / Neighbourhood</label>
                            <input type="text" id="storyLocation" placeholder="e.g., Hebbagodi, JP Nagar Ward 42" />
                        </div>
                        <div class="form-group">
                            <label for="storyThemes">Themes (comma-separated)</label>
                            <input type="text" id="storyThemes" placeholder="e.g., Waste Management, Community Space" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="storyYoutubeUrl">YouTube Video URL (optional)</label>
                            <input type="url" id="storyYoutubeUrl" placeholder="https://www.youtube.com/watch?v=..." />
                        </div>
                        <div class="form-group">
                            <label for="storyStatus">Status</label>
                            <select id="storyStatus">
                                <option value="active">Active</option>
                                <option value="draft">Draft</option>
                                <option value="archived">Archived</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="storyExcerpt">Short Excerpt</label>
                        <textarea id="storyExcerpt" rows="2" placeholder="A brief summary of the story (1-2 sentences)"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="storyContent">Story Content (Markdown)</label>
                        <div style="display: flex; gap: 0.5rem; align-items: flex-start;">
                            <textarea id="storyContent" rows="8" placeholder="Write the full story using markdown..." style="flex: 1;"></textarea>
                            <button type="button" onclick="openStoryEditor()" class="btn-secondary" style="white-space: nowrap;">
                                <i class="fa-solid fa-expand"></i> Full Editor
                            </button>
                        </div>
                        <small style="color: var(--color-text-light); font-size: 0.85rem;">Supports markdown: **bold**, *italic*, [links](url), # headers, etc.</small>
                    </div>

                    <div class="form-actions">
                        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary" id="submitBtn">
                            <span id="submitBtnText">Save</span>
                            <span id="submitBtnLoader" class="loader" style="display: none;">
                                <i class="fa-solid fa-spinner fa-spin"></i>
                            </span>
                        </button>
                    </div>
                </form>
                <div class="resize-handle" title="Drag to resize"></div>
            </div>
        </div>

        <!-- Story Editor Modal (injected by admin-modals.js) -->
        <!-- View Details Modal (injected by admin-modals.js) -->
    </div>
</section>

<!-- Markdown parser library (marked.js) -->
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<!-- Fuse.js for fuzzy search -->
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/admin/auth.js"></script>
<script src="/assets/admin/admin-modals.js"></script>
<script>
injectViewModal('Story Details');
injectMarkdownEditor({
    modalId: 'editorModal',
    headerId: 'editorModalHeader',
    textareaId: 'editorText',
    previewId: 'editorPreview',
    placeholder: 'Write your story here using markdown...',
    saveLabel: 'Save Content',
    onSave: 'saveEditorContent',
    onClose: 'closeStoryEditor'
});
</script>
<script src="/assets/admin/stories.js"></script>

    </main>

</body>
</html>
