<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Organizations - NOTF Admin | NOTF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/chat/chat.css">
</head>
<body style="margin: 0; padding: 0; background: transparent;">
    <main>
        
<link rel="stylesheet" href="/assets/admin/admin.css">

<section class="admin-page">
    <div class="admin-container">
        <div class="page-header minimal">
            <h1>Solution Providers <span id="adminProviderCount" style="font-size: 0.7em; color: #C45A2A; font-weight: 500;">(0)</span></h1>
            <div class="icon-actions">
                <button class="icon-btn primary" onclick="showCreateForm()">
                    <i class="fa-solid fa-plus"></i>
                    <span>Add New</span>
                </button>
                <button class="icon-btn success" onclick="exportToExcel()">
                    <i class="fa-solid fa-file-excel"></i>
                    <span>Export</span>
                </button>
                <button class="icon-btn warning" onclick="showImportModal()">
                    <i class="fa-solid fa-file-import"></i>
                    <span>Import</span>
                </button>
                <button class="icon-btn" onclick="loadOrganizations()">
                    <i class="fa-solid fa-arrows-rotate"></i>
                    <span>Refresh</span>
                </button>
            </div>
        </div>

        <div class="search-bar minimal">
            <div class="minimal-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search organizations..." />
            </div>
            <div class="filter-chips">
                <button class="chip" data-status="active" onclick="setStatusFilter('active', this)">
                    <i class="fa-solid fa-circle-check"></i>
                    Active
                </button>
                <button class="chip" data-status="pending" onclick="setStatusFilter('pending', this)">
                    <i class="fa-regular fa-clock"></i>
                    Pending
                </button>
                <button class="chip active" data-status="all" onclick="setStatusFilter('all', this)">
                    <i class="fa-solid fa-list"></i>
                    All
                </button>
            </div>
        </div>

        <div id="organizationsList" class="organizations-list minimal">
            <p class="loading">Loading organizations...</p>
        </div>

        <!-- Create/Edit Modal -->
        <div id="formModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header" id="formModalHeader">
                    <div class="drag-handle" title="Drag to move">
                        <i class="fa-solid fa-grip-vertical"></i>
                    </div>
                    <div style="flex: 1;">
                        <h2 id="modalTitle">Add Solution Provider</h2>
                    </div>
                    <button onclick="closeModal()" class="btn-close">×</button>
                </div>
                <form id="organizationForm" class="organization-form">
                    <input type="hidden" id="orgId" />
                    <input type="hidden" id="orgFilePath" />

                    <div class="form-row">
                        <div class="form-group full">
                            <label for="orgName">Organization Name *</label>
                            <input type="text" id="orgName" required />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="orgTheme">Theme/Sector</label>
                            <input type="text" id="orgTheme" placeholder="e.g., Water, Waste, Energy" />
                        </div>
                        <div class="form-group">
                            <label for="orgLocation">Location</label>
                            <input type="text" id="orgLocation" placeholder="City, State" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="orgDescription">Description</label>
                        <textarea id="orgDescription" rows="3"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="orgContactPerson">Contact Person</label>
                            <input type="text" id="orgContactPerson" />
                        </div>
                        <div class="form-group">
                            <label for="orgContactEmail">Email</label>
                            <input type="email" id="orgContactEmail" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="orgOffers">What They Offer (one per line)</label>
                        <textarea id="orgOffers" rows="4" placeholder="Expertise in waste management&#10;Training programs&#10;Consulting services"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="orgAsks">What They Need (one per line)</label>
                        <textarea id="orgAsks" rows="4" placeholder="Funding for programs&#10;Volunteers&#10;Partnership opportunities"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="orgStatus">Status</label>
                            <select id="orgStatus">
                                <option value="active">Active</option>
                                <option value="pending">Pending</option>
                                <option value="archived">Archived</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary" id="submitBtn">
                            <span id="submitBtnText">Save</span>
                            <span id="submitBtnLoader" class="loader" style="display: none;">
                                <i class="fa-solid fa-spinner fa-spin"></i>
                            </span>
                        </button>
                    </div>
                </form>
                <div class="resize-handle" title="Drag to resize"></div>
            </div>
        </div>

        <!-- View Details Modal -->
        <div id="viewModal" class="modal view-modal" style="display: none;">
            <div class="modal-content">
                <div class="view-header" id="viewModalHeader">
                    <div class="drag-handle" title="Drag to move">
                        <i class="fa-solid fa-grip-vertical"></i>
                    </div>
                    <div style="flex: 1;">
                        <h2 id="viewTitle">Provider Details</h2>
                        <span id="viewStatus" class="status-indicator"></span>
                    </div>
                    <button onclick="closeViewModal()" class="btn-close" style="color: white;">×</button>
                </div>
                <div class="view-body" id="viewBody">
                    <!-- Content will be dynamically loaded -->
                </div>
                <div class="resize-handle" title="Drag to resize"></div>
            </div>
        </div>

        <!-- Import Modal -->
        <div id="importModal" class="modal" style="display: none;">
            <div class="modal-content" style="max-width: 700px;">
                <div class="modal-header">
                    <h2><i class="fa-solid fa-file-import"></i> Import from Excel</h2>
                    <button onclick="closeImportModal()" class="btn-close">×</button>
                </div>
                <div class="modal-body">
                    <!-- Upload Area -->
                    <div id="uploadArea" style="
                        border: 2px dashed #B9C98A;
                        border-radius: 8px;
                        padding: 3rem;
                        text-align: center;
                        cursor: pointer;
                        transition: all 0.3s ease;
                        background: #FAF6E8;
                    ">
                        <i class="fa-solid fa-cloud-arrow-up" style="font-size: 3rem; color: #B9C98A; margin-bottom: 1rem;"></i>
                        <p style="font-size: 1.1rem; margin-bottom: 0.5rem;">Drop Excel file here or click to browse</p>
                        <p style="font-size: 0.9rem; color: #666;">Supports .xlsx files exported from this system</p>
                        <input type="file" id="fileInput" accept=".xlsx" style="display: none;" />
                    </div>

                    <!-- Validation Results -->
                    <div id="validationResults" style="display: none; margin-top: 2rem;">
                        <h3 style="margin-bottom: 1rem;">Validation Results</h3>
                        <div id="validationStats" style="
                            display: grid;
                            grid-template-columns: repeat(3, 1fr);
                            gap: 1rem;
                            margin-bottom: 1.5rem;
                        "></div>
                        <div id="errorsList"></div>
                    </div>

                    <!-- Import Actions -->
                    <div id="importActions" style="display: none; margin-top: 2rem; gap: 0.75rem;">
                        <button type="button" id="downloadErrorsBtn" onclick="downloadErrorLog()" class="btn-secondary" style="display: none;">
                            <i class="fa-solid fa-download"></i> Download Error Log
                        </button>
                        <button type="button" id="executeImportBtn" onclick="executeImport()" class="btn-primary">
                            <i class="fa-solid fa-check"></i> Import Valid Rows
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Import Progress Modal -->
        <div id="progressModal" class="modal" style="display: none;">
            <div class="modal-content" style="max-width: 500px;">
                <div class="modal-header">
                    <h2><i class="fa-solid fa-spinner fa-spin"></i> Importing...</h2>
                </div>
                <div class="modal-body">
                    <div style="padding: 2rem;">
                        <div id="progressText" style="text-align: center; margin-bottom: 1rem; font-size: 1.1rem;">
                            Updating records...
                        </div>
                        <div style="
                            width: 100%;
                            height: 30px;
                            background: #e0e0e0;
                            border-radius: 15px;
                            overflow: hidden;
                        ">
                            <div id="progressBar" style="
                                height: 100%;
                                background: linear-gradient(90deg, #B9C98A, #2F4A2C);
                                width: 0%;
                                transition: width 0.3s ease;
                            "></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Markdown parser library (marked.js) for rendering stories -->
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<!-- Fuse.js for fuzzy search -->
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<!-- SheetJS for Excel export/import -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/admin/auth.js"></script>
<script src="/assets/admin/organizations.js"></script>
<!-- Excel export/import modules -->
<script src="/assets/admin/excel-common.js"></script>
<script src="/assets/admin/excel-export.js"></script>
<script src="/assets/admin/excel-import.js"></script>

    </main>

</body>
</html>
