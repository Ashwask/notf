<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Organizations - NOTF Admin | NOTF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/chat/chat.css">
</head>
<body style="margin: 0; padding: 0; background: transparent;">
    <main>
        
<link rel="stylesheet" href="/assets/admin/admin.css">

<section class="admin-page">
    <div class="admin-container">
        <div class="page-header minimal">
            <h1>Solution Providers</h1>
            <div class="icon-actions">
                <button class="icon-btn primary" data-tooltip="Add Organization" onclick="showCreateForm()">
                    <i class="fa-solid fa-plus"></i>
                </button>
                <button class="icon-btn" data-tooltip="Refresh" onclick="loadOrganizations()">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
            </div>
        </div>

        <div class="search-bar minimal">
            <div class="minimal-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search organizations..." />
            </div>
            <div class="filter-chips">
                <button class="chip active" data-status="active" onclick="setStatusFilter('active', this)">
                    <i class="fa-solid fa-circle-check"></i>
                    Active
                </button>
                <button class="chip" data-status="pending" onclick="setStatusFilter('pending', this)">
                    <i class="fa-regular fa-clock"></i>
                    Pending
                </button>
                <button class="chip" data-status="all" onclick="setStatusFilter('all', this)">
                    <i class="fa-solid fa-list"></i>
                    All
                </button>
            </div>
        </div>

        <div id="organizationsList" class="organizations-list minimal">
            <p class="loading">Loading organizations...</p>
        </div>

        <!-- Create/Edit Modal -->
        <div id="formModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Add Solution Provider</h2>
                    <button onclick="closeModal()" class="btn-close">×</button>
                </div>
                <form id="organizationForm" class="organization-form">
                    <input type="hidden" id="orgId" />
                    <input type="hidden" id="orgFilePath" />

                    <div class="form-row">
                        <div class="form-group full">
                            <label for="orgName">Organization Name *</label>
                            <input type="text" id="orgName" required />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="orgTheme">Theme/Sector</label>
                            <input type="text" id="orgTheme" placeholder="e.g., Water, Waste, Energy" />
                        </div>
                        <div class="form-group">
                            <label for="orgLocation">Location</label>
                            <input type="text" id="orgLocation" placeholder="City, State" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="orgDescription">Description</label>
                        <textarea id="orgDescription" rows="3"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="orgContactPerson">Contact Person</label>
                            <input type="text" id="orgContactPerson" />
                        </div>
                        <div class="form-group">
                            <label for="orgContactEmail">Email</label>
                            <input type="email" id="orgContactEmail" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="orgOffers">What They Offer (one per line)</label>
                        <textarea id="orgOffers" rows="4" placeholder="Expertise in waste management&#10;Training programs&#10;Consulting services"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="orgAsks">What They Need (one per line)</label>
                        <textarea id="orgAsks" rows="4" placeholder="Funding for programs&#10;Volunteers&#10;Partnership opportunities"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="orgStatus">Status</label>
                            <select id="orgStatus">
                                <option value="active">Active</option>
                                <option value="pending">Pending</option>
                                <option value="archived">Archived</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary" id="submitBtn">
                            <span id="submitBtnText">Save</span>
                            <span id="submitBtnLoader" class="loader" style="display: none;">
                                <i class="fa-solid fa-spinner fa-spin"></i>
                            </span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- View Details Modal -->
        <div id="viewModal" class="modal view-modal" style="display: none;">
            <div class="modal-content">
                <div class="view-header" id="viewModalHeader">
                    <div class="drag-handle" title="Drag to move">
                        <i class="fa-solid fa-grip-vertical"></i>
                    </div>
                    <div style="flex: 1;">
                        <h2 id="viewTitle">Provider Details</h2>
                        <span id="viewStatus" class="status-indicator"></span>
                    </div>
                    <button onclick="closeViewModal()" class="btn-close" style="color: white;">×</button>
                </div>
                <div class="view-body" id="viewBody">
                    <!-- Content will be dynamically loaded -->
                </div>
                <div class="resize-handle" title="Drag to resize"></div>
            </div>
        </div>
    </div>
</section>

<!-- Markdown parser library (marked.js) for rendering stories -->
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/admin/auth.js"></script>
<script src="/assets/admin/organizations.js"></script>

    
            <!-- Chatbot Widget -->
            <!-- Floating Action Button (shows when minimized) -->
            <button id="chat-fab" class="chat-fab hidden" aria-label="Open NOTF Assistant">
                <i class="fa-solid fa-comments"></i>
            </button>

            <!-- Chat Window -->
            <div id="notf-chatbot" class="chat-widget">
                <div class="chat-header">
                    <div class="chat-header-title">
                        <i class="fa-solid fa-robot"></i>
                        <span>NOTF Assistant</span>
                    </div>
                    <div class="chat-header-actions">
                        <button class="chat-close-button" aria-label="Close chat">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>

                <div class="chat-messages">

                </div>

                <div class="chat-input">
                    <textarea
                        class="chat-input-field"
                        placeholder="Type your message..."
                        rows="1"
                        aria-label="Chat message input"
                    ></textarea>
                    <button class="chat-send-button" aria-label="Send message">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>

    </main>

    <!-- Chatbot Scripts -->
    <script src="/assets/chat/discovery-engine.js"></script>
    <script src="/assets/chat/complaint-engine.js"></script>
    <script src="/assets/chat/boundary-validator.js"></script>
    <script src="/assets/chat/unified-chatbot.js"></script>

</body>
</html>
