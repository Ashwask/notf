<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTF Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/admin/admin.css">
    <link rel="stylesheet" href="/assets/admin/dashboard.css">
</head>
<body>
    <!-- Sidebar toggle -->
    <button class="sidebar-toggle" id="sidebarToggle">
        <i class="fa-solid fa-bars" style="font-size: 1.25rem;"></i>
    </button>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>NOTF Admin</h1>
                <p>Neighbourhood of the Future</p>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="communities">
                    <span class="icon">
                        <i class="fa-solid fa-house"></i>
                    </span>
                    <span class="label">Communities</span>
                </a>
                <a href="#" class="nav-item" data-page="solution-providers">
                    <span class="icon">
                        <i class="fa-solid fa-wrench"></i>
                    </span>
                    <span class="label">Solution Providers</span>
                </a>
                <a href="#" class="nav-item" data-page="matcher">
                    <span class="icon">
                        <i class="fa-solid fa-link"></i>
                    </span>
                    <span class="label">Matcher</span>
                </a>
                <a href="#" class="nav-item" data-page="geocode">
                    <span class="icon">
                        <i class="fa-solid fa-location-dot"></i>
                    </span>
                    <span class="label">Geocoding Tool</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button onclick="authUtils.signOut()" class="btn-logout">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Pages will be loaded here via iframe -->
            <iframe id="contentFrame" src="/admin/communities.html" frameborder="0"></iframe>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/admin/auth.js"></script>
    <script>
        // Require authentication
        (async function() {
            const session = await authUtils.requireAuth();
            if (!session) return;
        })();

        // Sidebar toggle functionality
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const dashboardContainer = document.querySelector('.dashboard-container');

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            dashboardContainer.classList.toggle('sidebar-hidden');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            dashboardContainer.classList.add('sidebar-hidden');
        }

        sidebarToggle.addEventListener('click', toggleSidebar);

        // Navigation handling
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();

                // Update active state
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');

                // Load page
                const page = this.dataset.page;
                const iframe = document.getElementById('contentFrame');

                switch(page) {
                    case 'communities':
                        iframe.src = '/admin/communities.html';
                        break;
                    case 'solution-providers':
                        iframe.src = '/admin/organizations.html';
                        break;
                    case 'matcher':
                        iframe.src = '/admin/matcher.html';
                        break;
                    case 'geocode':
                        iframe.src = '/admin/geocode-tool.html';
                        break;
                }

                // Close sidebar after navigation
                closeSidebar();
            });
        });

        // Close sidebar on logout
        const logoutBtn = document.querySelector('.btn-logout');
        logoutBtn.addEventListener('click', closeSidebar);
    </script>
</body>
</html>
