<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTF Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/admin/admin.css">
    <link rel="stylesheet" href="/assets/admin/dashboard.css">
    <link rel="stylesheet" href="/assets/chat/chat.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>NOTF Admin</h1>
                <p>Neighbourhood of the Future</p>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item nav-item-toggle" id="sidebarToggle" data-label="Collapse">
                    <span class="icon">
                        <i class="fa-solid fa-angles-left" id="toggleIcon"></i>
                    </span>
                    <span class="label">Collapse</span>
                </a>
                <a href="#" class="nav-item active" data-page="communities" data-label="Communities">
                    <span class="icon">
                        <i class="fa-solid fa-house"></i>
                    </span>
                    <span class="label">Communities</span>
                </a>
                <a href="#" class="nav-item" data-page="solution-providers" data-label="Solution Providers">
                    <span class="icon">
                        <i class="fa-solid fa-wrench"></i>
                    </span>
                    <span class="label">Solution Providers</span>
                </a>
                <a href="#" class="nav-item" data-page="matcher" data-label="Matcher">
                    <span class="icon">
                        <i class="fa-solid fa-link"></i>
                    </span>
                    <span class="label">Matcher</span>
                </a>
                <a href="#" class="nav-item" data-page="geocode" data-label="Geocoding Tool">
                    <span class="icon">
                        <i class="fa-solid fa-location-dot"></i>
                    </span>
                    <span class="label">Geocoding Tool</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button onclick="authUtils.logout()" class="btn-logout">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Pages will be loaded here via iframe -->
            <iframe id="contentFrame" src="/admin/communities.html" frameborder="0"></iframe>
        
            <!-- Chatbot Widget -->
            <div id="notf-chatbot">
                <div class="chat-header">
                    <div class="chat-header-title">
                        <span>🤖</span>
                        <span>NOTF Assistant</span>
                    </div>
                    <div class="chat-header-actions">
                        <button class="chat-minimize-button" aria-label="Minimize chat">−</button>
                        <button class="chat-close-button" aria-label="Close chat">✕</button>
                    </div>
                </div>

                <div class="chat-messages">

                </div>

                <div class="chat-input">
                    <textarea
                        class="chat-input-field"
                        placeholder="Type your message..."
                        rows="1"
                        aria-label="Chat message input"
                    ></textarea>
                    <button class="chat-send-button" aria-label="Send message">
                        Send
                    </button>
                </div>
            </div>

    </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/admin/auth.js"></script>
    <script>
        // Require authentication
        (async function() {
            const session = await authUtils.requireAuth();
            if (!session) return;
        })();

        // Sidebar toggle functionality
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const dashboardContainer = document.querySelector('.dashboard-container');

        function toggleSidebar(e) {
            e.preventDefault();
            const isMobile = window.innerWidth <= 768;
            const isCollapsed = dashboardContainer.classList.contains('sidebar-collapsed');
            const toggleIcon = document.getElementById('toggleIcon');
            const toggleLabel = sidebarToggle.querySelector('.label');

            if (isMobile) {
                // Mobile: Toggle between overlay and hidden
                sidebar.classList.toggle('mobile-open');
                toggleIcon.className = sidebar.classList.contains('mobile-open')
                    ? 'fa-solid fa-times'
                    : 'fa-solid fa-bars';
                toggleLabel.textContent = sidebar.classList.contains('mobile-open') ? 'Close' : 'Menu';
            } else {
                // Desktop: Toggle between expanded and mini-sidebar
                if (isCollapsed) {
                    dashboardContainer.classList.remove('sidebar-collapsed');
                    toggleIcon.className = 'fa-solid fa-angles-left';
                    toggleLabel.textContent = 'Collapse';
                    sidebarToggle.setAttribute('data-label', 'Collapse');
                } else {
                    dashboardContainer.classList.add('sidebar-collapsed');
                    toggleIcon.className = 'fa-solid fa-angles-right';
                    toggleLabel.textContent = 'Expand';
                    sidebarToggle.setAttribute('data-label', 'Expand');
                }
            }
        }

        sidebarToggle.addEventListener('click', toggleSidebar);

        // Handle window resize to adjust behavior
        window.addEventListener('resize', function() {
            const isMobile = window.innerWidth <= 768;
            const toggleIcon = document.getElementById('toggleIcon');
            const toggleLabel = sidebarToggle.querySelector('.label');

            if (!isMobile) {
                // Desktop mode: remove mobile classes
                sidebar.classList.remove('mobile-open');
                const isCollapsed = dashboardContainer.classList.contains('sidebar-collapsed');
                toggleIcon.className = isCollapsed
                    ? 'fa-solid fa-angles-right'
                    : 'fa-solid fa-angles-left';
                toggleLabel.textContent = isCollapsed ? 'Expand' : 'Collapse';
                sidebarToggle.setAttribute('data-label', isCollapsed ? 'Expand' : 'Collapse');
            } else {
                // Mobile mode: reset to hamburger
                dashboardContainer.classList.remove('sidebar-collapsed');
                toggleIcon.className = sidebar.classList.contains('mobile-open')
                    ? 'fa-solid fa-times'
                    : 'fa-solid fa-bars';
                toggleLabel.textContent = sidebar.classList.contains('mobile-open') ? 'Close' : 'Menu';
            }
        });

        // Navigation handling
        document.querySelectorAll('.nav-item:not(.nav-item-toggle)').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();

                // Update active state
                document.querySelectorAll('.nav-item:not(.nav-item-toggle)').forEach(i => i.classList.remove('active'));
                this.classList.add('active');

                // Load page
                const page = this.dataset.page;
                const iframe = document.getElementById('contentFrame');

                switch(page) {
                    case 'communities':
                        iframe.src = '/admin/communities.html';
                        break;
                    case 'solution-providers':
                        iframe.src = '/admin/organizations.html';
                        break;
                    case 'matcher':
                        iframe.src = '/admin/matcher.html';
                        break;
                    case 'geocode':
                        iframe.src = '/admin/geocode-tool.html';
                        break;
                }

                // Keep sidebar open after navigation (no auto-close)
                // Optional: Close on mobile only
                // if (window.innerWidth <= 768) sidebar.classList.remove('mobile-open');
            });
        });
    </script>

    <!-- Chatbot Scripts -->
    <script src="/assets/chat/discovery-engine.js"></script>
    <script src="/assets/chat/complaint-engine.js"></script>
    <script src="/assets/chat/boundary-validator.js"></script>
    <script src="/assets/chat/unified-chatbot.js"></script>

</body>
</html>
