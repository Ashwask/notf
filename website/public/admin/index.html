<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTF Admin Dashboard</title>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/admin/admin.css">
    <link rel="stylesheet" href="/assets/admin/dashboard.css">
    <link rel="stylesheet" href="/assets/chat/chat.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Mobile Backdrop -->
        <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

        <!-- Mobile Hamburger Button (visible only on mobile, outside sidebar) -->
        <button class="mobile-hamburger" id="mobileHamburger" aria-label="Toggle menu">
            <i class="fa-solid fa-bars"></i>
        </button>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/assets/images/notf-terracotta.png" alt="NOTF" class="sidebar-logo sidebar-logo-expanded">
                <img src="/assets/images/notf-logo-collapsed.png" alt="NOTF" class="sidebar-logo sidebar-logo-collapsed">
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item nav-item-toggle" id="sidebarToggle" data-label="Collapse">
                    <span class="icon">
                        <i class="fa-solid fa-angles-left" id="toggleIcon"></i>
                    </span>
                    <span class="label">Collapse</span>
                </a>
                <a href="#" class="nav-item active" data-page="communities" data-label="Communities">
                    <span class="icon">
                        <i class="fa-solid fa-house"></i>
                    </span>
                    <span class="label">Communities</span>
                </a>
                <a href="#" class="nav-item" data-page="solution-providers" data-label="Solution Providers">
                    <span class="icon">
                        <i class="fa-solid fa-wrench"></i>
                    </span>
                    <span class="label">Solution Providers</span>
                </a>
                <a href="#" class="nav-item" data-page="stories" data-label="Stories">
                    <span class="icon">
                        <i class="fa-solid fa-book-open"></i>
                    </span>
                    <span class="label">Stories</span>
                </a>
                <a href="#" class="nav-item" data-page="matcher" data-label="Matcher">
                    <span class="icon">
                        <i class="fa-solid fa-link"></i>
                    </span>
                    <span class="label">Matcher</span>
                </a>
                <a href="#" class="nav-item" data-page="geocode" data-label="Geocoding Tool">
                    <span class="icon">
                        <i class="fa-solid fa-location-dot"></i>
                    </span>
                    <span class="label">Geocoding Tool</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button onclick="authUtils.logout()" class="btn-logout">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Pages will be loaded here via iframe -->
            <iframe id="contentFrame" src="/admin/communities.html" frameborder="0"></iframe>
    </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/admin/auth.js"></script>
    <script>
        // Require authentication
        (async function() {
            const session = await authUtils.requireAuth();
            if (!session) return;

            // Restore last visited page
            restoreLastPage();
        })();

        // Sidebar toggle functionality
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const mobileHamburger = document.getElementById('mobileHamburger');
        const sidebarBackdrop = document.getElementById('sidebarBackdrop');
        const dashboardContainer = document.querySelector('.dashboard-container');

        // Restore sidebar state from localStorage on page load
        function restoreSidebarState() {
            const isMobile = window.innerWidth <= 768;
            const savedState = localStorage.getItem('admin-sidebar-collapsed');
            const toggleIcon = document.getElementById('toggleIcon');
            const toggleLabel = sidebarToggle.querySelector('.label');

            if (isMobile) {
                // Mobile: Always start with hamburger menu (sidebar closed)
                sidebar.classList.remove('mobile-open');
                toggleIcon.className = 'fa-solid fa-bars';
                toggleLabel.textContent = 'Menu';
                sidebarToggle.setAttribute('data-label', 'Menu');
            } else {
                // Desktop: Apply saved state
                if (savedState === 'true') {
                    dashboardContainer.classList.add('sidebar-collapsed');
                    toggleIcon.className = 'fa-solid fa-angles-right';
                    toggleLabel.textContent = 'Expand';
                    sidebarToggle.setAttribute('data-label', 'Expand');
                } else {
                    toggleIcon.className = 'fa-solid fa-angles-left';
                    toggleLabel.textContent = 'Collapse';
                    sidebarToggle.setAttribute('data-label', 'Collapse');
                }
            }
        }

        // Call on page load
        restoreSidebarState();

        function toggleSidebar(e) {
            e.preventDefault();
            const isMobile = window.innerWidth <= 768;
            const isCollapsed = dashboardContainer.classList.contains('sidebar-collapsed');
            const toggleIcon = document.getElementById('toggleIcon');
            const toggleLabel = sidebarToggle.querySelector('.label');

            if (isMobile) {
                // Mobile: Toggle between overlay and hidden
                sidebar.classList.toggle('mobile-open');
                sidebarBackdrop.classList.toggle('active');
                toggleIcon.className = sidebar.classList.contains('mobile-open')
                    ? 'fa-solid fa-times'
                    : 'fa-solid fa-bars';
                toggleLabel.textContent = sidebar.classList.contains('mobile-open') ? 'Close' : 'Menu';
            } else {
                // Desktop: Toggle between expanded and mini-sidebar
                if (isCollapsed) {
                    dashboardContainer.classList.remove('sidebar-collapsed');
                    toggleIcon.className = 'fa-solid fa-angles-left';
                    toggleLabel.textContent = 'Collapse';
                    sidebarToggle.setAttribute('data-label', 'Collapse');
                    // Save expanded state
                    localStorage.setItem('admin-sidebar-collapsed', 'false');
                } else {
                    dashboardContainer.classList.add('sidebar-collapsed');
                    toggleIcon.className = 'fa-solid fa-angles-right';
                    toggleLabel.textContent = 'Expand';
                    sidebarToggle.setAttribute('data-label', 'Expand');
                    // Save collapsed state
                    localStorage.setItem('admin-sidebar-collapsed', 'true');
                }
            }
        }

        sidebarToggle.addEventListener('click', toggleSidebar);

        // Mobile hamburger button click handler
        mobileHamburger.addEventListener('click', function() {
            sidebar.classList.toggle('mobile-open');
            sidebarBackdrop.classList.toggle('active');

            // Update hamburger icon
            const icon = mobileHamburger.querySelector('i');
            if (sidebar.classList.contains('mobile-open')) {
                icon.className = 'fa-solid fa-times';
            } else {
                icon.className = 'fa-solid fa-bars';
            }
        });

        // Close sidebar when clicking backdrop on mobile
        sidebarBackdrop.addEventListener('click', function() {
            if (window.innerWidth <= 768 && sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
                sidebarBackdrop.classList.remove('active');

                // Reset hamburger icon
                const icon = mobileHamburger.querySelector('i');
                icon.className = 'fa-solid fa-bars';

                // Also reset desktop toggle if needed
                const toggleIcon = document.getElementById('toggleIcon');
                const toggleLabel = sidebarToggle.querySelector('.label');
                toggleIcon.className = 'fa-solid fa-bars';
                toggleLabel.textContent = 'Menu';
            }
        });

        // Handle window resize to adjust behavior
        window.addEventListener('resize', function() {
            const isMobile = window.innerWidth <= 768;
            const toggleIcon = document.getElementById('toggleIcon');
            const toggleLabel = sidebarToggle.querySelector('.label');
            const hamburgerIcon = mobileHamburger.querySelector('i');

            if (!isMobile) {
                // Desktop mode: remove mobile classes and backdrop
                sidebar.classList.remove('mobile-open');
                sidebarBackdrop.classList.remove('active');
                const isCollapsed = dashboardContainer.classList.contains('sidebar-collapsed');
                toggleIcon.className = isCollapsed
                    ? 'fa-solid fa-angles-right'
                    : 'fa-solid fa-angles-left';
                toggleLabel.textContent = isCollapsed ? 'Expand' : 'Collapse';
                sidebarToggle.setAttribute('data-label', isCollapsed ? 'Expand' : 'Collapse');

                // Reset hamburger icon for when we resize back to mobile
                hamburgerIcon.className = 'fa-solid fa-bars';
            } else {
                // Mobile mode: reset to hamburger
                dashboardContainer.classList.remove('sidebar-collapsed');
                toggleIcon.className = sidebar.classList.contains('mobile-open')
                    ? 'fa-solid fa-times'
                    : 'fa-solid fa-bars';
                toggleLabel.textContent = sidebar.classList.contains('mobile-open') ? 'Close' : 'Menu';

                // Update mobile hamburger icon
                hamburgerIcon.className = sidebar.classList.contains('mobile-open')
                    ? 'fa-solid fa-times'
                    : 'fa-solid fa-bars';
            }
        });

        // Save current page to localStorage
        function saveCurrentPage(page) {
            localStorage.setItem('admin-last-page', page);
        }

        // Restore last visited page
        function restoreLastPage() {
            const lastPage = localStorage.getItem('admin-last-page');

            if (lastPage) {
                // Find the nav item for this page
                const navItem = document.querySelector(`.nav-item[data-page="${lastPage}"]`);

                if (navItem) {
                    // Update active state
                    document.querySelectorAll('.nav-item:not(.nav-item-toggle)').forEach(i => i.classList.remove('active'));
                    navItem.classList.add('active');

                    // Load the page
                    loadPage(lastPage);
                }
            }
            // If no last page saved, default communities.html is already loaded in iframe src
        }

        // Load page by name
        function loadPage(page) {
            const iframe = document.getElementById('contentFrame');

            switch(page) {
                case 'communities':
                    iframe.src = '/admin/communities.html';
                    break;
                case 'solution-providers':
                    iframe.src = '/admin/organizations.html';
                    break;
                case 'matcher':
                    iframe.src = '/admin/matcher.html';
                    break;
                case 'stories':
                    iframe.src = '/admin/stories.html';
                    break;
                case 'geocode':
                    iframe.src = '/admin/geocode-tool.html';
                    break;
            }
        }

        // Navigation handling
        document.querySelectorAll('.nav-item:not(.nav-item-toggle)').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();

                // Update active state
                document.querySelectorAll('.nav-item:not(.nav-item-toggle)').forEach(i => i.classList.remove('active'));
                this.classList.add('active');

                // Load page
                const page = this.dataset.page;
                loadPage(page);

                // Save current page to localStorage
                saveCurrentPage(page);

                // Keep sidebar open after navigation (no auto-close)
                // Optional: Close on mobile only
                // if (window.innerWidth <= 768) sidebar.classList.remove('mobile-open');
            });
        });
    </script>

</body>
</html>
