<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTF Admin Dashboard</title>
    <link rel="stylesheet" href="/assets/admin/admin.css">
    <link rel="stylesheet" href="/assets/admin/dashboard.css">
</head>
<body>
    <!-- Sidebar toggle -->
    <button class="sidebar-toggle" id="sidebarToggle">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>NOTF Admin</h1>
                <p>Neighbourhood of the Future</p>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="communities">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                    </span>
                    <span class="label">Communities</span>
                </a>
                <a href="#" class="nav-item" data-page="solution-providers">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                        </svg>
                    </span>
                    <span class="label">Solution Providers</span>
                </a>
                <a href="#" class="nav-item" data-page="matcher">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                        </svg>
                    </span>
                    <span class="label">Matcher</span>
                </a>
                <a href="#" class="nav-item" data-page="geocode">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </span>
                    <span class="label">Geocoding Tool</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button onclick="authUtils.signOut()" class="btn-logout">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Pages will be loaded here via iframe -->
            <iframe id="contentFrame" src="/admin/communities.html" frameborder="0"></iframe>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/admin/auth.js"></script>
    <script>
        // Require authentication
        (async function() {
            const session = await authUtils.requireAuth();
            if (!session) return;
        })();

        // Sidebar toggle functionality
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const dashboardContainer = document.querySelector('.dashboard-container');

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            dashboardContainer.classList.toggle('sidebar-hidden');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            dashboardContainer.classList.add('sidebar-hidden');
        }

        sidebarToggle.addEventListener('click', toggleSidebar);

        // Navigation handling
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();

                // Update active state
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');

                // Load page
                const page = this.dataset.page;
                const iframe = document.getElementById('contentFrame');

                switch(page) {
                    case 'communities':
                        iframe.src = '/admin/communities.html';
                        break;
                    case 'solution-providers':
                        iframe.src = '/admin/organizations.html';
                        break;
                    case 'matcher':
                        iframe.src = '/admin/matcher.html';
                        break;
                    case 'geocode':
                        iframe.src = '/admin/geocode-tool.html';
                        break;
                }

                // Close sidebar after navigation
                closeSidebar();
            });
        });

        // Close sidebar on logout
        const logoutBtn = document.querySelector('.btn-logout');
        logoutBtn.addEventListener('click', closeSidebar);
    </script>
</body>
</html>
