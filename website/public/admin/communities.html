<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Communities - NOTF Admin | NOTF</title>
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-brand">
                <a href="/" class="logo-link">
                    <img src="/assets/images/notf-logo.png" alt="NOTF Logo" class="nav-logo">
                    <span class="nav-title">NOTF</span>
                </a>
            </div>
            
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <div class="nav-menu" id="navMenu">
                <a href="/">Home</a>
                <a href="/solution-providers/">Solution Providers</a>
                <a href="/communities/">Communities</a>
                <a href="/map/">Map</a>
                <a href="/join/" class="join-link">Join</a>
                <a href="/search/" class="search-link" title="Search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </a>
                <a href="/admin/login.html" class="admin-link" title="Admin Login">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        <path d="M9 12l2 2 4-4"></path>
                    </svg>
                </a>
            </div>
        </nav>
    </header>
    
    <main>
        
<link rel="stylesheet" href="/assets/admin/admin.css">

<section class="admin-page">
    <div class="admin-container">
        <div class="page-header">
            <div>
                <h1>🏘️ Communities</h1>
                <p class="subtitle">Manage community organizations and groups</p>
            </div>
            <div class="header-actions">
                <a href="/admin/dashboard.html" class="btn-secondary">← Dashboard</a>
                <button onclick="showCreateForm()" class="btn-primary">➕ Add New</button>
                <button onclick="authUtils.logout()" class="btn-secondary">Logout</button>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by name, city, or theme..." />
            <select id="statusFilter">
                <option value="all">All Status</option>
                <option value="active" selected>Active Only</option>
                <option value="pending">Pending Only</option>
            </select>
        </div>

        <div id="communitiesList" class="organizations-list">
            <p class="loading">Loading communities...</p>
        </div>

        <!-- Create/Edit Modal -->
        <div id="formModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Add Community</h2>
                    <button onclick="closeModal()" class="btn-close">×</button>
                </div>
                <form id="communityForm" class="organization-form">
                    <input type="hidden" id="commId" />
                    <input type="hidden" id="commFilePath" />

                    <div class="form-row">
                        <div class="form-group full">
                            <label for="commName">Community Name *</label>
                            <input type="text" id="commName" required />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="commCity">City *</label>
                            <input type="text" id="commCity" required placeholder="e.g., Bengaluru, Mumbai" />
                        </div>
                        <div class="form-group">
                            <label for="commState">State</label>
                            <input type="text" id="commState" placeholder="e.g., Karnataka" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="commNeighborhood">Neighborhood/Area</label>
                            <input type="text" id="commNeighborhood" placeholder="e.g., Malleshwaram, HSR Layout" />
                        </div>
                        <div class="form-group">
                            <label for="commWard">Ward (auto-detected)</label>
                            <input type="text" id="commWard" placeholder="Auto-populated from coordinates" readonly style="background: #f5f5f5;" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="commDescription">Description</label>
                        <textarea id="commDescription" rows="3" placeholder="Brief description of the community"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="commPopulation">Population</label>
                            <input type="text" id="commPopulation" placeholder="Approximate population" />
                        </div>
                        <div class="form-group">
                            <label for="commGeography">Geography</label>
                            <input type="text" id="commGeography" placeholder="Brief geographic description" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="commThemes">Themes / Focus Areas (one per line)</label>
                        <textarea id="commThemes" rows="3" placeholder="Water&#10;Waste&#10;Energy&#10;Mobility"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="commLeadOrg">Lead Organization</label>
                            <input type="text" id="commLeadOrg" placeholder="Reference to member file" />
                        </div>
                        <div class="form-group">
                            <label for="commLeadOrgName">Lead Organization Name</label>
                            <input type="text" id="commLeadOrgName" placeholder="Display name" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="commContactPerson">Contact Person</label>
                            <input type="text" id="commContactPerson" />
                        </div>
                        <div class="form-group">
                            <label for="commContactEmail">Contact Email</label>
                            <input type="email" id="commContactEmail" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="commContactPhone">Contact Phone</label>
                        <input type="text" id="commContactPhone" placeholder="+91-XXXXXXXXXX" />
                    </div>

                    <div class="form-group">
                        <label for="commOffers">What They Offer (one per line)</label>
                        <textarea id="commOffers" rows="4" placeholder="Community space&#10;Local knowledge&#10;Volunteer network"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="commAsks">What They Need (one per line)</label>
                        <textarea id="commAsks" rows="4" placeholder="Technical expertise&#10;Funding&#10;Training programs"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="commStories">Stories</label>
                        <textarea id="commStories" rows="4" placeholder="Community stories and impact narratives"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="commStatus">Status</label>
                            <select id="commStatus">
                                <option value="active">Active</option>
                                <option value="pending">Pending</option>
                                <option value="archived">Archived</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="commCollabStatus">Collaboration Status</label>
                            <input type="text" id="commCollabStatus" placeholder="e.g., Yet to be connected, Active" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="commStarted">Started Date</label>
                            <input type="date" id="commStarted" />
                        </div>
                        <div class="form-group">
                            <label for="commLastUpdated">Last Updated</label>
                            <input type="date" id="commLastUpdated" readonly style="background: #f5f5f5;" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="commLatitude">Latitude (optional override)</label>
                            <input type="number" id="commLatitude" step="0.0000001" placeholder="12.9716" />
                        </div>
                        <div class="form-group">
                            <label for="commLongitude">Longitude (optional override)</label>
                            <input type="number" id="commLongitude" step="0.0000001" placeholder="77.5946" />
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary" id="submitBtn">
                            <span id="submitBtnText">Save</span>
                            <span id="submitBtnLoader" class="loader" style="display: none;">🔄</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/admin/auth.js"></script>
<script src="/assets/admin/communities.js"></script>

    </main>
    
    <footer>
        <p>
            <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="license noopener noreferrer" class="cc-license">
                <img src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" alt="CC" class="cc-icon">
                <img src="https://mirrors.creativecommons.org/presskit/icons/by.svg" alt="BY" class="cc-icon">
                <img src="https://mirrors.creativecommons.org/presskit/icons/nc.svg" alt="NC" class="cc-icon">
                <img src="https://mirrors.creativecommons.org/presskit/icons/sa.svg" alt="SA" class="cc-icon">
            </a>
            <span class="cc-text">2025 Neighbourhoods of the Future. Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="noopener noreferrer">CC BY-NC-SA 4.0</a></span>
        </p>
    </footer>
    
    <script>
        // Hamburger menu toggle
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');
        
        hamburger.addEventListener('click', function() {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });
        
        // Close menu when clicking a link
        const navLinks = navMenu.querySelectorAll('a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });
        
        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            if (!hamburger.contains(event.target) && !navMenu.contains(event.target)) {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
