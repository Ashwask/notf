    <style>
        #map {
            width: 100%;
            height: 600px;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .map-legend {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 1rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 0.5rem 0;
        }

        .legend-marker {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 0.75rem;
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .legend-marker.community {
            background-color: #667eea;
        }

        .legend-marker.provider {
            background-color: #f56565;
        }

        .map-stats {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .map-stat-card {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 150px;
        }

        .map-stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .map-stat-label {
            color: #666;
            font-size: 0.9rem;
        }

        .leaflet-popup-content {
            min-width: 200px;
        }

        .popup-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .popup-type {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .popup-type.community {
            background-color: #667eea;
            color: white;
        }

        .popup-type.provider {
            background-color: #f56565;
            color: white;
        }

        .popup-info {
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }

        .popup-contact {
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        .popup-contact a {
            color: #667eea;
            text-decoration: none;
        }

        .popup-contact a:hover {
            text-decoration: underline;
        }

        /* Layer control styling */
        .leaflet-control-layers {
            background: white;
            padding: 0.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            font-family: inherit;
        }

        .leaflet-control-layers-toggle {
            background-image: none;
            width: auto;
            height: auto;
        }

        .leaflet-control-layers-expanded {
            padding: 1rem;
            line-height: 1.8;
        }

        .leaflet-control-layers label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .leaflet-control-layers input[type="checkbox"] {
            cursor: pointer;
        }

        /* City selector dropdown */
        .city-selector-control {
            background: white;
            padding: 0.75rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            min-width: 180px;
        }

        .city-selector-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 0.5rem;
            display: block;
        }

        .city-selector-dropdown {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            background: white;
            font-family: inherit;
        }

        .city-selector-dropdown:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        /* Ward boundary tooltips */
        .ward-tooltip {
            background-color: rgba(102, 126, 234, 0.95);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .ward-tooltip::before {
            border-top-color: rgba(102, 126, 234, 0.95);
        }
    </style>

    <script>
        // Hamburger menu toggle
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');

        hamburger.addEventListener('click', function() {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        const navLinks = navMenu.querySelectorAll('a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });

        document.addEventListener('click', function(event) {
            if (!hamburger.contains(event.target) && !navMenu.contains(event.target)) {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            }
        });
    </script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet Omnivore for loading KML/GeoJSON -->
    <script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>

    <!-- Load Supabase and data -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/data-loader.js"></script>
    <script>
        // City coordinates for major Indian cities (fallback)
        const cityCoordinates = {
            'Bangalore': { lat: 12.9716, lng: 77.5946 },
            'Bengaluru': { lat: 12.9716, lng: 77.5946 },
            'Mumbai': { lat: 19.0760, lng: 72.8777 },
            'Delhi': { lat: 28.6139, lng: 77.2090 },
            'Ahmedabad': { lat: 23.0225, lng: 72.5714 },
            'Bhubaneswar': { lat: 20.2961, lng: 85.8245 },
            'Pune': { lat: 18.5204, lng: 73.8567 },
            'Kolkata': { lat: 22.5726, lng: 88.3639 },
            'Chennai': { lat: 13.0827, lng: 80.2707 },
            'Hyderabad': { lat: 17.3850, lng: 78.4867 },
            'Gurugram': { lat: 28.4595, lng: 77.0266 },
            'Visakhapatnam': { lat: 17.6868, lng: 83.2185 },
            'Thane': { lat: 19.2183, lng: 72.9781 },
            'Jaipur': { lat: 26.9124, lng: 75.7873 }
        };

        // Neighborhood coordinates (loaded from JSON)
        let neighborhoodCoordinates = {};

        // Fuzzy match neighborhood name to ward name
        function findNeighborhoodCoords(neighborhoodName) {
            if (!neighborhoodName) return null;

            // Normalize the input
            const normalized = neighborhoodName.toLowerCase().trim()
                .replace(/\s+/g, ' ')
                .replace(/[^\w\s]/g, '');

            // Try exact match first
            for (const [ward, coords] of Object.entries(neighborhoodCoordinates)) {
                const normalizedWard = ward.toLowerCase().trim()
                    .replace(/\s+/g, ' ')
                    .replace(/[^\w\s]/g, '');

                if (normalized === normalizedWard) {
                    return coords;
                }
            }

            // Try partial match (ward contains neighborhood or vice versa)
            for (const [ward, coords] of Object.entries(neighborhoodCoordinates)) {
                const normalizedWard = ward.toLowerCase().trim()
                    .replace(/\s+/g, ' ')
                    .replace(/[^\w\s]/g, '');

                if (normalizedWard.includes(normalized) || normalized.includes(normalizedWard)) {
                    return coords;
                }
            }

            return null;
        }

        // Initialize the map
        const map = L.map('map').setView([20.5937, 78.9629], 5); // Center on India

        // Add OpenStreetMap tiles
        const baseLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);

        // Create layer group for corporation boundaries
        const corporationLayer = L.layerGroup();
        // Ward layers will be created dynamically for each city

        // Custom icons with larger, more visible markers
        const communityIcon = L.divIcon({
            className: 'custom-marker',
            html: '<div style="background-color: #667eea; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 3px 8px rgba(0,0,0,0.4);"></div>',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });

        // Get coordinates for a location
        function getCoordinates(item, type) {
            // PRIORITY 1: Use database coordinates if available (from geocoding tool)
            if (item.latitude && item.longitude) {
                return {
                    lat: parseFloat(item.latitude),
                    lng: parseFloat(item.longitude)
                };
            }

            // PRIORITY 2: Try neighborhood (with fuzzy matching for Bangalore)
            const neighborhood = item.neighborhood;
            if (neighborhood) {
                const coords = findNeighborhoodCoords(neighborhood);
                if (coords) {
                    // Add tiny random offset to avoid exact overlaps
                    const offset = Math.random() * 0.005 - 0.0025;
                    return {
                        lat: coords.lat + offset,
                        lng: coords.lng + offset
                    };
                }
            }

            // PRIORITY 3: Try location/city string
            const location = item.location || item.city;
            if (!location) return null;

            // Normalize location string
            const cityName = location.split(',')[0].trim();

            // Try location as a neighborhood name
            const locationCoords = findNeighborhoodCoords(cityName);
            if (locationCoords) {
                const offset = Math.random() * 0.005 - 0.0025;
                return {
                    lat: locationCoords.lat + offset,
                    lng: locationCoords.lng + offset
                };
            }

            // PRIORITY 4: Fall back to city coordinates
            for (const [city, coords] of Object.entries(cityCoordinates)) {
                if (city.toLowerCase() === cityName.toLowerCase()) {
                    // Add small random offset to avoid exact overlaps
                    const offset = Math.random() * 0.02 - 0.01;
                    return {
                        lat: coords.lat + offset,
                        lng: coords.lng + offset
                    };
                }
            }

            return null;
        }

        // Create popup content
        // Create tooltip content (shows on hover)
        function createTooltipContent(item, type) {
            let tooltip = `<strong>${item.name}</strong>`;

            // Add ward information if available
            if (item.ward) {
                tooltip += `<br>📍 ${item.ward}`;
            } else if (item.neighborhood) {
                tooltip += `<br>📍 ${item.neighborhood}`;
            }

            return tooltip;
        }

        function createPopupContent(item, type) {
            const typeLabel = type === 'community' ? 'Community' : 'Solution Provider';
            const typeClass = type === 'community' ? 'community' : 'provider';

            let html = `
                <div class="popup-title">${item.name}</div>
                <span class="popup-type ${typeClass}">${typeLabel}</span>
            `;

            if (type === 'community') {
                html += `<div class="popup-info">📍 ${item.city}${item.state ? ', ' + item.state : ''}</div>`;
                if (item.themes && item.themes.length > 0) {
                    html += `<div class="popup-info"><strong>Focus:</strong> ${item.themes.slice(0, 3).join(', ')}</div>`;
                }
            } else {
                html += `<div class="popup-info">📍 ${item.location || 'Location not specified'}</div>`;
                if (item.theme) {
                    html += `<div class="popup-info"><strong>Focus:</strong> ${item.theme}</div>`;
                }
            }

            if (item.description) {
                const shortDesc = item.description.length > 100
                    ? item.description.substring(0, 100) + '...'
                    : item.description;
                html += `<div class="popup-info">${shortDesc}</div>`;
            }

            if (item.contact && item.contact.email) {
                html += `<div class="popup-contact">✉️ <a href="mailto:${item.contact.email}">${item.contact.email}</a></div>`;
            }

            return html;
        }

        // Load and display data
        (async function() {
            await dataLoader.waitForSupabase();

            // Load neighborhood coordinates
            try {
                const response = await fetch('/assets/geodata/bangalore-neighborhoods.json');
                neighborhoodCoordinates = await response.json();
                console.log(`Loaded ${Object.keys(neighborhoodCoordinates).length} neighborhood coordinates`);
            } catch (error) {
                console.warn('Could not load neighborhood coordinates:', error);
            }

            // Focus on Bangalore first before loading boundaries
            map.setView([12.9716, 77.5946], 12);
            console.log('Map view set to Bangalore');

            // Load GeoJSON corporation boundaries
            console.log('Loading corporation boundaries...');
            fetch('/assets/geodata/gba_corporation.geojson')
                .then(r => {
                    console.log(`Corporation fetch: ${r.status} ${r.statusText}`);
                    return r.json();
                })
                .then(data => {
                    console.log(`Corporation data: ${data.features ? data.features.length : 0} features`);
                    const corpGeoJSON = L.geoJSON(data, {
                        style: {
                            color: '#ff6b6b',
                            weight: 3,
                            fillOpacity: 0.05,
                            fillColor: '#ff6b6b',
                            opacity: 0.8
                        }
                    });
                    corporationLayer.addLayer(corpGeoJSON);
                    console.log('✅ Corporation boundaries loaded and added to layer');
                    console.log(`Corporation bounds: ${JSON.stringify(corpGeoJSON.getBounds())}`);
                })
                .catch(error => {
                    console.error('❌ Corporation GeoJSON error:', error);
                });

            // Load KML ward boundaries for multiple cities
            console.log('Checking for leaflet-omnivore...');
            if (typeof omnivore !== 'undefined') {
                console.log('✅ Omnivore loaded, loading ward KML files...');

                // Define ward map configurations for each city
                const wardMaps = [
                    {
                        city: 'Bengaluru',
                        file: '/assets/geodata/gba-369-wards-december-2025.kml',
                        color: '#667eea',
                        layer: L.layerGroup()
                    },
                    {
                        city: 'Mumbai',
                        file: '/assets/geodata/mumbai-wards.kml',
                        color: '#f093fb',
                        layer: L.layerGroup()
                    },
                    {
                        city: 'Chennai',
                        file: '/assets/geodata/chennai-wards.kml',
                        color: '#4facfe',
                        layer: L.layerGroup()
                    },
                    {
                        city: 'Hyderabad',
                        file: '/assets/geodata/hyderabad-wards.kml',
                        color: '#43e97b',
                        layer: L.layerGroup()
                    },
                    {
                        city: 'Ahmedabad',
                        file: '/assets/geodata/ahmedabad-wards.kml',
                        color: '#fa709a',
                        layer: L.layerGroup()
                    },
                    {
                        city: 'Kolkata',
                        file: '/assets/geodata/kolkata-wards.kml',
                        color: '#9333ea',
                        layer: L.layerGroup()
                    },
                    {
                        city: 'Pune',
                        file: '/assets/geodata/pune-wards.kml',
                        color: '#fb923c',
                        layer: L.layerGroup()
                    },
                    {
                        city: 'Gurugram',
                        file: '/assets/geodata/gurugram-wards.kml',
                        color: '#10b981',
                        layer: L.layerGroup()
                    },
                    {
                        city: 'Visakhapatnam',
                        file: '/assets/geodata/visakhapatnam-wards.kml',
                        color: '#06b6d4',
                        layer: L.layerGroup()
                    },
                    {
                        city: 'Thane',
                        file: '/assets/geodata/thane-wards.kml',
                        color: '#ec4899',
                        layer: L.layerGroup()
                    },
                    {
                        city: 'Jaipur',
                        file: '/assets/geodata/jaipur-wards.kml',
                        color: '#f59e0b',
                        layer: L.layerGroup()
                    },
                    {
                        city: 'Bhubaneswar',
                        file: '/assets/geodata/bhubaneswar-wards.kml',
                        color: '#8b5cf6',
                        layer: L.layerGroup()
                    }
                ];

                // Load each city's ward map
                wardMaps.forEach(config => {
                    const wardKML = omnivore.kml(config.file)
                        .on('ready', function() {
                            console.log(`✅ ${config.city} ward KML ready, layers: ${Object.keys(this._layers).length}`);

                            this.setStyle({
                                color: config.color,
                                weight: 1,
                                fillOpacity: 0.03,
                                fillColor: config.color,
                                opacity: 0.6
                            });

                            // Add tooltips to each ward polygon
                            this.eachLayer(function(layer) {
                                if (layer.feature && layer.feature.properties) {
                                    const props = layer.feature.properties;
                                    const wardName = props.name || props.Name || props.WARD_NAME || props.ward_name || 'Ward';
                                    const wardNumber = props.number || props.Number || props.WARD_NO || props.ward_no || '';

                                    let tooltipText = '';
                                    if (wardNumber) {
                                        tooltipText = `Ward ${wardNumber}`;
                                        if (wardName && wardName !== 'Ward') {
                                            tooltipText += ` - ${wardName}`;
                                        }
                                    } else if (wardName) {
                                        tooltipText = wardName;
                                    }

                                    if (tooltipText) {
                                        layer.bindTooltip(tooltipText, {
                                            permanent: false,
                                            direction: 'center',
                                            className: 'ward-tooltip'
                                        });
                                    }
                                }
                            });

                            console.log(`✅ ${config.city} ward boundaries styled and tooltips added`);
                        })
                        .on('error', function(e) {
                            console.error(`❌ ${config.city} ward KML error:`, e);
                        });

                    config.layer.addLayer(wardKML);
                });

                // Store ward layers for layer control
                window.wardLayers = wardMaps;
                console.log('All ward layers created');
            } else {
                console.error('❌ leaflet-omnivore NOT loaded');
            }

            // Create custom city selector control
            const CitySelectorControl = L.Control.extend({
                options: {
                    position: 'topright'
                },

                onAdd: function(map) {
                    const container = L.DomUtil.create('div', 'city-selector-control leaflet-bar');

                    container.innerHTML = `
                        <label class="city-selector-label">Select City</label>
                        <select class="city-selector-dropdown" id="citySelector">
                            <option value="Bengaluru">Bengaluru</option>
                            <option value="Mumbai">Mumbai</option>
                            <option value="Chennai">Chennai</option>
                            <option value="Hyderabad">Hyderabad</option>
                            <option value="Ahmedabad">Ahmedabad</option>
                            <option value="Kolkata">Kolkata</option>
                            <option value="Pune">Pune</option>
                            <option value="Gurugram">Gurugram</option>
                            <option value="Visakhapatnam">Visakhapatnam</option>
                            <option value="Thane">Thane</option>
                            <option value="Jaipur">Jaipur</option>
                            <option value="Bhubaneswar">Bhubaneswar</option>
                        </select>
                    `;

                    // Prevent map clicks when interacting with dropdown
                    L.DomEvent.disableClickPropagation(container);
                    L.DomEvent.disableScrollPropagation(container);

                    return container;
                }
            });

            map.addControl(new CitySelectorControl());

            // Load communities first
            const communities = await dataLoader.loadCommunities();

            // Function to switch to a city
            function switchToCity(cityName) {
                console.log(`Switching to ${cityName}`);

                // Remove all current layers
                map.eachLayer(layer => {
                    if (layer !== map._layers[Object.keys(map._layers)[0]]) { // Keep base tile layer
                        if (layer.options && (layer.options.attribution === undefined || (layer.options.attribution && layer.options.attribution.includes('OpenStreetMap')))) {
                            // Skip base layer
                        } else {
                            map.removeLayer(layer);
                        }
                    }
                });

                // Clear corporation and ward layers
                corporationLayer.clearLayers();
                if (window.wardLayers) {
                    window.wardLayers.forEach(config => {
                        config.layer.clearLayers();
                    });
                }

                // Re-add corporation boundaries (only for Bengaluru)
                if (cityName === 'Bengaluru') {
                    fetch('/assets/geodata/gba_corporation.geojson')
                        .then(response => response.json())
                        .then(data => {
                            L.geoJSON(data, {
                                style: {
                                    color: '#FF6B6B',
                                    weight: 2,
                                    fillOpacity: 0.05,
                                    fillColor: '#FF6B6B'
                                }
                            }).addTo(corporationLayer);
                            corporationLayer.addTo(map);
                        })
                        .catch(error => {
                            console.error('Error loading corporation boundaries:', error);
                        });
                }

                // Add selected city's ward layer
                if (window.wardLayers) {
                    const selectedCity = window.wardLayers.find(w => w.city === cityName);
                    if (selectedCity) {
                        console.log(`Loading ward KML for ${cityName}: ${selectedCity.file}`);
                        const wardKML = omnivore.kml(selectedCity.file)
                            .on('ready', function() {
                                console.log(`✅ ${cityName} ward KML loaded successfully`);
                                this.setStyle({
                                    color: selectedCity.color,
                                    weight: 1,
                                    fillOpacity: 0.03,
                                    fillColor: selectedCity.color,
                                    opacity: 0.6
                                });

                                // Add tooltips
                                this.eachLayer(function(layer) {
                                    if (layer.feature && layer.feature.properties) {
                                        const props = layer.feature.properties;
                                        const wardName = props.name || props.Name || props.WARD_NAME || props.ward_name || 'Ward';
                                        const wardNumber = props.number || props.Number || props.WARD_NO || props.ward_no || '';

                                        let tooltipText = '';
                                        if (wardNumber) {
                                            tooltipText = `Ward ${wardNumber}`;
                                            if (wardName && wardName !== 'Ward') {
                                                tooltipText += ` - ${wardName}`;
                                            }
                                        } else if (wardName) {
                                            tooltipText = wardName;
                                        }

                                        if (tooltipText) {
                                            layer.bindTooltip(tooltipText, {
                                                permanent: false,
                                                direction: 'center',
                                                className: 'ward-tooltip'
                                            });
                                        }
                                    }
                                });
                            })
                            .on('error', function(e) {
                                console.error(`❌ Error loading ${cityName} ward KML:`, e);
                            });

                        selectedCity.layer.clearLayers();
                        selectedCity.layer.addLayer(wardKML);
                        selectedCity.layer.addTo(map);
                    } else {
                        console.error(`❌ City not found in wardLayers: ${cityName}`);
                    }
                }

                // Zoom to city
                const cityCoord = cityCoordinates[cityName];
                if (cityCoord) {
                    map.setView([cityCoord.lat, cityCoord.lng], 12);
                }

                // Re-add community markers (they'll be filtered by coordinates)
                communities.forEach(comm => {
                    const coords = getCoordinates(comm, 'community');
                    if (coords) {
                        const marker = L.marker([coords.lat, coords.lng], { icon: communityIcon })
                            .addTo(map)
                            .bindPopup(createPopupContent(comm, 'community'))
                            .bindTooltip(createTooltipContent(comm, 'community'), {
                                direction: 'top',
                                offset: [0, -10],
                                opacity: 0.9
                            });
                    }
                });
            }

            // Add event listener to city selector
            setTimeout(() => {
                const citySelector = document.getElementById('citySelector');
                if (citySelector) {
                    citySelector.addEventListener('change', function() {
                        switchToCity(this.value);
                    });
                }
            }, 100);

            // Add corporation layer and Bengaluru wards by default
            corporationLayer.addTo(map);
            if (window.wardLayers) {
                const bengaluruWards = window.wardLayers.find(w => w.city === 'Bengaluru');
                if (bengaluruWards) {
                    bengaluruWards.layer.addTo(map);
                }
            }

            // Add community markers
            let communityCount = 0;
            communities.forEach(comm => {
                const coords = getCoordinates(comm, 'community');
                if (coords) {
                    const marker = L.marker([coords.lat, coords.lng], { icon: communityIcon })
                        .addTo(map)
                        .bindPopup(createPopupContent(comm, 'community'))
                        .bindTooltip(createTooltipContent(comm, 'community'), {
                            direction: 'top',
                            offset: [0, -10],
                            opacity: 0.9
                        });
                    communityCount++;
                }
            });

            console.log(`Mapped ${communityCount} communities`);
        })();
    </script>
