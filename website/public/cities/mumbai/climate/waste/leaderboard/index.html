<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="mumbai.climate.waste.leaderboard.title">Waste Management Ward Leaderboard | Mumbai Climate | NOTF</title>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <meta name="description" content="Ward-level leaderboard for waste management climate metrics in Mumbai - see how all 227 wards rank on waste segregation, recycling, and landfill diversion.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/climate/leaderboard.css">
    <link rel="stylesheet" href="/assets/css/climate/ward-modal.css">
    <link rel="stylesheet" href="/assets/i18n/language-selector.css">
</head>
<body>
    <div id="notf-header" data-city="mumbai" data-city-subpage="climate"></div>
    <script src="/assets/js/components/header.js"></script>
<main>
        <!-- Sector Tabs -->
        <nav class="sector-tabs">
            <a href="/cities/mumbai/climate/energy/" class="sector-tab">
                <i class="fa-solid fa-bolt"></i> Energy
            </a>
            <a href="/cities/mumbai/climate/waste/" class="sector-tab active">
                <i class="fa-solid fa-recycle"></i> Waste
            </a>
        </nav>

        <!-- Hero -->
        <section class="leaderboard-hero">
            <div class="breadcrumb" style="margin-bottom: var(--space-md);">
                <a href="/" data-i18n="nav.home">Home</a> /
                <a href="/cities/mumbai/" data-i18n="mumbai.name">Mumbai</a> /
                <a href="/cities/mumbai/climate/" data-i18n="mumbai.climate.title">Climate</a> /
                <a href="/cities/mumbai/climate/waste/" data-i18n="mumbai.climate.waste.title">Waste Management</a> /
                <span data-i18n="mumbai.climate.waste.leaderboard.breadcrumb">Leaderboard</span>
            </div>
            <h1>
                <i class="fa-solid fa-trophy"></i>
                <span data-i18n="mumbai.climate.waste.leaderboard.heading">Waste Management Ward Leaderboard</span>
            </h1>
            <p data-i18n="mumbai.climate.waste.leaderboard.description">Compare performance across all 227 wards on waste management climate metrics</p>
        </section>

        <!-- Controls -->
        <section class="leaderboard-controls">
            <div class="controls-container">
                <div class="control-group">
                    <label for="metricSelect">
                        <i class="fa-solid fa-chart-line"></i>
                        <span data-i18n="mumbai.climate.waste.leaderboard.metric">Metric:</span>
                    </label>
                    <select id="metricSelect" class="control-select">
                        <option value="segregation_rate" data-i18n="mumbai.climate.waste.leaderboard.metrics.segregation">Waste Segregation (% at source)</option>
                        <option value="recycling_rate" data-i18n="mumbai.climate.waste.leaderboard.metrics.recycling">Recycling Rate (% recycled)</option>
                        <option value="waste_generation" data-i18n="mumbai.climate.waste.leaderboard.metrics.generation">Waste Generation (kg/capita/day)</option>
                        <option value="landfill_diversion" data-i18n="mumbai.climate.waste.leaderboard.metrics.diversion">Landfill Diversion (% diverted)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="zoneFilter">
                        <i class="fa-solid fa-filter"></i>
                        <span data-i18n="mumbai.climate.waste.leaderboard.filter">Filter:</span>
                    </label>
                    <select id="zoneFilter" class="control-select">
                        <option value="all" data-i18n="mumbai.climate.waste.leaderboard.zones.all">All Zones (227 wards)</option>
                        <option value="northern" data-i18n="mumbai.climate.waste.leaderboard.zones.northern">Northern Suburbs (78 wards)</option>
                        <option value="eastern" data-i18n="mumbai.climate.waste.leaderboard.zones.eastern">Eastern Suburbs (49 wards)</option>
                        <option value="western" data-i18n="mumbai.climate.waste.leaderboard.zones.western">Western Suburbs (44 wards)</option>
                        <option value="central" data-i18n="mumbai.climate.waste.leaderboard.zones.central">Central (35 wards)</option>
                        <option value="south" data-i18n="mumbai.climate.waste.leaderboard.zones.south">South Mumbai (21 wards)</option>
                    </select>
                </div>

                <div class="leaderboard-stats">
                    <span>
                        <img src="/assets/images/icons/location.svg" alt="" style="width:20px;height:20px;">
                        <strong id="wardCount">227</strong> <span data-i18n="mumbai.climate.waste.leaderboard.wards">wards</span>
                    </span>
                </div>
            </div>
        </section>

        <!-- Leaderboard Table -->
        <section class="leaderboard-section">
            <div class="leaderboard-container">
                <div id="leaderboardTable"></div>

                <div style="text-align: center; margin-top: var(--space-xl);">
                    <a href="/cities/mumbai/climate/waste/" class="btn btn-secondary">
                        <i class="fa-solid fa-arrow-left"></i>
                        <span data-i18n="mumbai.climate.waste.leaderboard.backButton">Back to Waste Management</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <div id="notf-footer"></div>
    <script src="/assets/js/components/footer.js"></script>

    <!-- Nav Highlight -->

    <!-- Climate Data & Leaderboard -->
    <script src="/assets/js/climate/data-loader.js"></script>
    <script src="/assets/js/climate/leaderboard.js"></script>
    <script src="/assets/js/climate/ward-modal.js"></script>

    <script>
        // Initialize ClimateDataLoader for Mumbai
        window.climateData = new ClimateDataLoader('mumbai');

        // Define waste management metrics
        const WASTE_METRICS = [
            {
                key: 'segregation_rate',
                name: 'Waste Segregation',
                unit: '%',
                path: 'percentage',
                inverted: false // Higher is better
            },
            {
                key: 'recycling_rate',
                name: 'Recycling Rate',
                unit: '%',
                path: 'percentage',
                inverted: false // Higher is better
            },
            {
                key: 'waste_generation',
                name: 'Waste Generation',
                unit: ' kg/capita/day',
                path: 'per_capita',
                inverted: true // Lower is better
            },
            {
                key: 'landfill_diversion',
                name: 'Landfill Diversion',
                unit: '%',
                path: 'percentage',
                inverted: false // Higher is better
            }
        ];

        let leaderboard;
        let wardModal;

        // Initialize leaderboard and modal
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize ward modal
            wardModal = new WardModal('mumbai');

            // Initialize leaderboard with modal support
            leaderboard = new WardLeaderboard('leaderboardTable', {
                sector: 'waste_management',
                sectorSlug: 'waste',
                defaultMetric: 'segregation_rate',
                metrics: WASTE_METRICS,
                useModal: true,
                city: 'mumbai'
            });

            // Metric selector
            const metricSelect = document.getElementById('metricSelect');
            metricSelect.addEventListener('change', (e) => {
                const metricKey = e.target.value;
                leaderboard.updateMetric(metricKey);
            });

            // Zone filter (replaces corporation filter)
            const zoneFilter = document.getElementById('zoneFilter');
            zoneFilter.addEventListener('change', (e) => {
                const zone = e.target.value;
                leaderboard.updateCorporation(zone); // Uses same method internally

                // Update ward count
                const count = zone === 'all' ? 227 : getZoneWardCount(zone);
                document.getElementById('wardCount').textContent = count;
            });
        });

        function getZoneWardCount(zone) {
            const counts = {
                'northern': 78,
                'eastern': 49,
                'western': 44,
                'central': 35,
                'south': 21
            };
            return counts[zone] || 227;
        }
    </script>

    <script src="/assets/js/components/common-scripts.js"></script>
</body>
</html>
