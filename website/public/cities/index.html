<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Cities | NOTF</title>
    <meta name="description" content="Explore 13 cities across India with ward-level data, community networks, climate dashboards, and local initiatives.">

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/i18n/language-selector.css">
    <style>
        /* Breadcrumb styles */
        .breadcrumb {
            padding: 1rem 0;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .breadcrumb a {
            color: var(--forest-green, #2F4A2C);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .breadcrumb a:hover {
            color: #253B23;
            text-decoration: underline;
        }

        .breadcrumb .separator {
            margin: 0 0.5rem;
            color: #999;
        }

        .breadcrumb .current {
            color: #666;
        }

        /* Hero - now uses shared .page-hero from main.css */

        /* === CITY SELECTOR CARDS === */
        .city-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--space-lg, 32px);
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: var(--space-xl, 48px);
        }

        .city-selector-card {
            background: var(--color-bg-white, #ffffff);
            border: 2px solid var(--slate-blue, #3F5F7A);
            border-radius: var(--radius-lg, 12px);
            padding: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(44, 44, 44, 0.1);
            display: flex;
            flex-direction: column;
            min-height: 220px;
        }

        .city-selector-card:hover {
            border-color: var(--terracotta, #C45A2A);
            box-shadow: 0 4px 16px rgba(44, 44, 44, 0.15);
            transform: translateY(-4px);
        }

        .city-card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .city-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .city-icon i {
            font-size: 36px;
        }

        .city-info {
            flex: 1;
        }

        .city-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--charcoal, #2B2B2B);
            margin-bottom: 4px;
        }

        .city-state {
            font-size: 14px;
            color: var(--color-text-light, #666);
        }

        .city-meta {
            display: flex;
            gap: var(--space-sm, 8px);
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .meta-badge {
            background: rgba(185, 201, 138, 0.15);
            color: var(--forest-green, #2F4A2C);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .city-features {
            flex: 1;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 12px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 13px;
        }

        .feature-item i {
            width: 20px;
            text-align: center;
        }

        .feature-item.available {
            color: var(--forest-green, #2F4A2C);
        }

        .feature-item.available i {
            color: var(--olive-green, #B9C98A);
        }

        .feature-item.coming-soon {
            color: var(--color-text-lighter, #999);
            font-style: italic;
        }

        .feature-item.coming-soon i {
            color: var(--mustard-yellow, #F5B82E);
        }

        .city-cta {
            margin-top: auto;
        }

        .city-cta .btn {
            width: 100%;
            justify-content: center;
            background: var(--forest-green, #2F4A2C);
            color: var(--warm-cream, #FAF6E8);
        }

        .city-cta .btn:hover {
            opacity: 0.9;
        }

        /* Loading state */
        .loading-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: var(--space-xl, 48px);
            max-width: 600px;
            margin: 0 auto;
        }

        .loading-state .loading-icon {
            font-size: 48px;
            color: var(--olive-green, #B9C98A);
            opacity: 0.3;
            margin-bottom: var(--space-lg, 32px);
        }

        .loading-state blockquote {
            font-size: 1.25rem;
            font-style: italic;
            color: var(--color-text, #333);
            line-height: 1.8;
            margin-bottom: var(--space-md, 16px);
            border-left: 4px solid var(--olive-green, #B9C98A);
            padding-left: var(--space-md, 16px);
        }

        .loading-state blockquote p {
            margin: 0;
        }

        .loading-state .loading-author {
            font-size: 0.9rem;
            color: var(--color-text-light, #666);
            font-style: italic;
        }

        .loading-state .spinner {
            margin-top: var(--space-lg, 32px);
            font-size: 24px;
            color: var(--olive-green, #B9C98A);
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .city-features {
                grid-template-columns: 1fr;
                gap: 6px;
            }

            .city-selector-card {
                min-height: auto;
            }

            .feature-item {
                font-size: 14px;
            }

            .city-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="notf-header"></div>
    <script src="/assets/js/components/header.js"></script>
<main>
        <div class="page-container">
            <section class="content">
                <!-- Breadcrumb Navigation -->
                <nav class="breadcrumb">
                    <a href="/" data-i18n="nav.home">Home</a>
                    <span class="separator">&rsaquo;</span>
                    <span class="current" data-i18n="citiesPage.breadcrumb">Cities</span>
                </nav>

                <!-- Hero Section -->
                <div class="page-hero">
                    <div class="hero-icon">
                        <img src="/assets/images/icons/neighbourhood2.svg" alt="" style="width:48px;height:48px;">
                    </div>
                    <h1 data-i18n="citiesPage.title">Our Cities</h1>
                    <p data-i18n="citiesPage.subtitle">Explore 13 cities across India with ward-level data, community networks, and local initiatives.</p>
                </div>

                <!-- City Grid -->
                <div class="city-grid" id="cityGrid">
                    <div class="loading-state" id="loadingState">
                        <div class="loading-icon">
                            <img src="/assets/images/icons/neighbourhood2.svg" alt="" style="width:36px;height:36px;">
                        </div>
                        <blockquote>
                            <p data-i18n="common.loadingCitiesQuote">Great cities are not built by governments alone, but by communities working together.</p>
                        </blockquote>
                        <p class="loading-author" data-i18n="common.loadingCitiesAuthor">&mdash; Jane Jacobs</p>
                        <div class="spinner">
                            <i class="fa-solid fa-spinner fa-spin"></i>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <div id="notf-footer"></div>
    <script src="/assets/js/components/footer.js"></script>

    <!-- Load Cities Data -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/data-loader.js"></script>
    <script>
        // Load cities and render cards
        let citiesData = [];

        async function loadCities() {
            try {
                // Load static metadata for city structure
                const response = await fetch('/assets/data/cities-metadata.json');
                citiesData = await response.json();

                // Wait for Supabase to be ready
                if (window.dataLoader) {
                    await dataLoader.waitForSupabase();

                    // Query Supabase for real-time counts
                    const [communities, providers, stories] = await Promise.all([
                        dataLoader.loadCommunities().catch(err => {
                            console.warn('Failed to load communities:', err);
                            return [];
                        }),
                        dataLoader.loadSolutionProviders().catch(err => {
                            console.warn('Failed to load providers:', err);
                            return [];
                        }),
                        dataLoader.loadStories().catch(err => {
                            console.warn('Failed to load stories:', err);
                            return [];
                        })
                    ]);

                    // City name variations (e.g., Bengaluru/Bangalore)
                    const cityVariations = {
                        'bengaluru': ['bengaluru', 'bangalore'],
                        'bangalore': ['bengaluru', 'bangalore']
                    };

                    // Update counts for each city based on live data
                    for (const city of citiesData.cities) {
                        const cityName = city.name.toLowerCase();
                        const citySlug = city.slug.toLowerCase();

                        // Get all valid variations for this city
                        const variations = cityVariations[citySlug] || [cityName, citySlug];

                        // Match communities by exact city match (with variations)
                        const cityComms = communities.filter(c => {
                            const commCity = (c.city || '').toLowerCase().trim();
                            if (!commCity) return false;
                            return variations.some(variant =>
                                commCity === variant ||
                                commCity.startsWith(variant + ',') ||
                                commCity.endsWith(', ' + variant)
                            );
                        });

                        // Match providers by location containing city name
                        const cityProvs = providers.filter(p => {
                            const provLocation = (p.location || '').toLowerCase().trim();
                            if (!provLocation) return false;
                            return variations.some(variant =>
                                provLocation === variant ||
                                provLocation.includes(', ' + variant) ||
                                provLocation.startsWith(variant + ',')
                            );
                        });

                        // Match stories by city name
                        const cityStories = stories.filter(s => {
                            const storyCity = (s.city || '').toLowerCase().trim();
                            if (!storyCity) return false;
                            return variations.some(variant => storyCity === variant);
                        });

                        // Update metadata with live counts
                        city.features.communities.count = cityComms.length;
                        city.features.communities.available = cityComms.length > 0;
                        city.features.providers.count = cityProvs.length;
                        city.features.providers.available = cityProvs.length > 0;
                        city.storyCount = cityStories.length;
                    }

                    console.log('[Cities Page] Loaded live counts from Supabase');
                } else {
                    console.warn('[Cities Page] dataLoader not available, using static counts');
                }

                // Render cards with live data
                renderCityCards(citiesData.cities);

            } catch (error) {
                console.error('[Cities Page] Error loading cities:', error);
                document.getElementById('cityGrid').innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 48px;">
                        <p style="color: var(--terracotta, #C45A2A);" data-i18n="citiesPage.errorLoading">Error loading cities. Please refresh the page.</p>
                    </div>
                `;
            }
        }

        function renderCityCards(cities) {
            const grid = document.getElementById('cityGrid');
            grid.innerHTML = cities.map(city => `
                <div class="city-selector-card" data-city="${city.slug}" style="border-color: ${city.color || '#2F4A2C'}">
                    <div class="city-card-header">
                        <div class="city-icon">
                            <img src="/assets/images/icons/neighbourhood2.svg" alt="" style="width:36px;height:36px;">
                        </div>
                        <div class="city-info">
                            <div class="city-name">${city.name}</div>
                            <div class="city-state">${city.state}</div>
                        </div>
                    </div>

                    <div class="city-meta">
                        <span class="meta-badge">
                            <i class="fa-solid fa-map-pin"></i> <span class="ward-count">${city.wardCount}</span> <span data-i18n="stats.wards">Wards</span>
                        </span>
                        <span class="meta-badge">
                            <i class="fa-solid fa-users"></i> ${(city.population / 1000000).toFixed(1)}M
                        </span>
                    </div>

                    <div class="city-features">
                        <div class="feature-item ${city.features.map.available ? 'available' : 'coming-soon'}">
                            <img src="/assets/images/icons/location.svg" alt="" style="width:20px;height:20px;">
                            <span data-i18n="${city.features.map.available ? 'citySelector.wardMap' : 'citySelector.mapComingSoon'}">${city.features.map.available ? 'Ward Map' : 'Map (Coming Soon)'}</span>
                        </div>
                        <div class="feature-item ${city.features.communities.available ? 'available' : 'coming-soon'}">
                            <img src="/assets/images/icons/community.svg" alt="" style="width:20px;height:20px;">
                            <span>${city.features.communities.available ? `${city.features.communities.count} ` : ''}<span data-i18n="${city.features.communities.available ? 'stats.communities' : 'citySelector.communitiesComingSoon'}">${city.features.communities.available ? 'Communities' : 'Communities (Coming Soon)'}</span></span>
                        </div>
                        <div class="feature-item ${city.features.climate.available ? 'available' : 'coming-soon'}">
                            <img src="/assets/images/icons/conservation.svg" alt="" style="width:20px;height:20px;">
                            <span data-i18n="${city.features.climate.available ? 'citySelector.climateDashboard' : 'citySelector.climateComingSoon'}">${city.features.climate.available ? 'Climate Dashboard' : 'Climate (Coming Soon)'}</span>
                        </div>
                        <div class="feature-item ${city.storyCount > 0 ? 'available' : 'coming-soon'}">
                            ${city.storyCount > 0
                                ? `<a href="/cities/${city.slug}/stories/" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
                                    <img src="/assets/images/icons/story.svg" alt="" style="width:20px;height:20px;">
                                    <span>${city.storyCount} <span data-i18n="stats.stories">Stories</span></span>
                                   </a>`
                                : `<img src="/assets/images/icons/story.svg" alt="" style="width:20px;height:20px;">
                                   <span data-i18n="citySelector.storiesComingSoon">Stories (Coming Soon)</span>`
                            }
                        </div>
                    </div>

                    <div class="city-cta">
                        <a href="/cities/${city.slug}/" class="btn" style="background-color: ${city.color || '#2F4A2C'}; color: #FAF6E8; border: none;">
                            <span data-i18n="citySelector.explore">Explore</span> ${city.name} <i class="fa-solid fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
            `).join('');

            // Re-translate the newly added content
            if (window.translator) {
                window.translator.translatePage();
            }
        }

        // Load cities on page load
        loadCities();
    </script>

    <script src="/assets/js/components/common-scripts.js"></script>
</body>
</html>
