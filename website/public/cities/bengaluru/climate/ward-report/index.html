<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ward Report Card | Bengaluru Climate | NOTF</title>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <meta name="description" content="Ward-level climate action report card across all sectors in Bengaluru.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/i18n/language-selector.css">
    <style>
        .ward-hero {
            background: var(--forest-green);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        .ward-hero h1 { color: white; margin-bottom: 0.5rem; font-size: 36px; }
        .ward-hero p { opacity: 0.8; }

        .sector-report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        .sector-report-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-left: 4px solid var(--olive-green);
            text-decoration: none;
            color: inherit;
            transition: box-shadow 0.2s, transform 0.2s;
            display: block;
        }
        .sector-report-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .sector-report-card h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--forest-green);
            margin-bottom: 1rem;
        }
        .sector-report-card .card-desc {
            color: #666;
            font-size: 0.9rem;
        }
        .sector-report-card .card-link {
            margin-top: 0.75rem;
            font-size: 0.8rem;
            color: var(--forest-green);
            font-weight: 600;
        }

        .ward-not-found {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        .back-link { margin-bottom: 1.5rem; }
        .back-link a {
            color: var(--forest-green);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .back-link a:hover { text-decoration: underline; }

        .report-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-xl) var(--space-md);
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="nav-brand">
                <a href="/" class="logo-link">
                    <img src="/assets/images/notf-terracotta.png" alt="NOTF Logo" class="nav-logo">
                </a>
            </div>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-menu" id="navMenu">
                <a href="/" data-i18n="nav.home">Home</a>
                <a href="/about/" data-i18n="nav.about">About</a>
                <a href="/communities/" data-i18n="nav.communities">Communities</a>
                <a href="/catalog/" data-i18n="nav.catalogue">Catalogue</a>
                <a href="/cities/" data-i18n="nav.cities">Cities</a>
                <a href="/join/" class="join-link" data-i18n="nav.join">Join</a>
                <a href="/admin/login.html" class="admin-link" data-i18n-title="nav.admin" title="Admin Login">
                    <i class="fa-solid fa-user-lock"></i>
                </a>
            </div>
        </nav>
    </header>
    <div class="city-sub-nav">
        <a href="/cities/bengaluru/" class="city-sub-nav-link">
            <i class="fa-solid fa-arrow-left"></i> Bengaluru
        </a>
        <a href="/cities/bengaluru/communities/" class="city-sub-nav-link">Communities</a>
        <a href="/cities/bengaluru/climate/" class="city-sub-nav-link active">Climate</a>
        <a href="/cities/bengaluru/map/" class="city-sub-nav-link">Map</a>
        <a href="/cities/bengaluru/stories/" class="city-sub-nav-link">Stories</a>
    </div>

    <main>
        <div class="report-content">
            <div class="back-link">
                <a href="/cities/bengaluru/climate/"><i class="fa-solid fa-arrow-left"></i> Back to Climate Dashboard</a>
            </div>
            <div class="ward-hero">
                <h1 id="wardName">Loading...</h1>
                <p>Climate Action Report Card</p>
            </div>
            <div class="sector-report-grid" id="reportGrid">
                <div class="hub-loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading ward data...</div>
            </div>
            <div class="ward-not-found" id="notFound" style="display:none;">
                <i class="fa-solid fa-magnifying-glass" style="font-size:2rem; margin-bottom:1rem; display:block; opacity:0.3;"></i>
                <p>Ward not found. <a href="/cities/bengaluru/climate/">Go back to the dashboard</a> and try searching again.</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-powered-by">
            <span data-i18n="footer.poweredBy">NOTF platform powered by</span>
            <a href="https://rainmatter.org/" target="_blank" rel="noopener noreferrer" class="rainmatter-link">
                <img src="/assets/images/rainmatter-logo.png" alt="Rainmatter Foundation" class="rainmatter-logo">
            </a>
        </div>
        <div class="footer-license">
            <span class="cc-text"><a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="license noopener noreferrer" class="cc-license">
                <img src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" alt="CC" class="cc-icon">
                <img src="https://mirrors.creativecommons.org/presskit/icons/by.svg" alt="BY" class="cc-icon">
                <img src="https://mirrors.creativecommons.org/presskit/icons/nc.svg" alt="NC" class="cc-icon">
                <img src="https://mirrors.creativecommons.org/presskit/icons/sa.svg" alt="SA" class="cc-icon">
                CC BY-NC-SA 4.0</a></span>
        </div>
    </footer>

    <script>
        // Hamburger menu toggle
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');

        hamburger.addEventListener('click', function() {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        const navLinks = navMenu.querySelectorAll('a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });

        document.addEventListener('click', function(event) {
            if (!hamburger.contains(event.target) && !navMenu.contains(event.target)) {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            }
        });
    </script>

    <!-- i18n Translation System -->
    <script src="/assets/i18n/translator.js"></script>

    <!-- Language Selector -->
    <script src="/assets/i18n/language-selector.js"></script>

    <!-- Chatbot Integration -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <link rel="stylesheet" href="/assets/chat/chat.css">
    <script src="/assets/chat/discovery-engine.js"></script>
    <script defer src="/assets/js/theme-categories.js"></script>
    <script defer src="/assets/js/utils.js"></script>
    <script defer src="/assets/chat/onboarding-engine.js"></script>
    <script src="/assets/chat/unified-chatbot.js"></script>
    <script src="/assets/js/nav-highlight.js"></script>

    <!-- Ward Report Card Logic -->
    <script>
        const params = new URLSearchParams(window.location.search);
        const wardSlug = params.get('ward');

        if (!wardSlug) {
            document.getElementById('notFound').style.display = 'block';
            document.getElementById('reportGrid').style.display = 'none';
            document.getElementById('wardName').textContent = 'No Ward Selected';
        } else {
            // Look up ward name from the ward index
            (async function() {
                let wardName = wardSlug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

                try {
                    const response = await fetch('/assets/data/climate/bengaluru/ward_index.json');
                    if (response.ok) {
                        const data = await response.json();
                        const ward = data.wards.find(w => w.slug === wardSlug);
                        if (ward) {
                            wardName = ward.name;
                        } else {
                            // Ward not found in index
                            document.getElementById('notFound').style.display = 'block';
                            document.getElementById('reportGrid').style.display = 'none';
                            document.getElementById('wardName').textContent = 'Ward Not Found';
                            return;
                        }
                    }
                } catch (err) {
                    console.warn('Could not load ward index:', err);
                }

                document.getElementById('wardName').textContent = wardName;
                document.title = wardName + ' - Ward Report Card | NOTF';

                const sectors = [
                    { name: 'Energy & Buildings', icon: 'fa-bolt', href: '/cities/bengaluru/climate/energy/wards/' + wardSlug + '/', color: '#F5B82E' },
                    { name: 'Transportation', icon: 'fa-bus', href: '/cities/bengaluru/climate/transportation/', color: '#3F5F7A' },
                    { name: 'Solid Waste', icon: 'fa-recycle', href: '/cities/bengaluru/climate/waste/', color: '#B9C98A' },
                    { name: 'Air Quality', icon: 'fa-wind', href: '/cities/bengaluru/climate/air-quality/', color: '#C45A2A' },
                    { name: 'Water', icon: 'fa-droplet', href: '/cities/bengaluru/climate/water/', color: '#3F5F7A' },
                    { name: 'Greening', icon: 'fa-tree', href: '/cities/bengaluru/climate/greening/', color: '#2F4A2C' },
                    { name: 'Disaster Management', icon: 'fa-triangle-exclamation', href: '/cities/bengaluru/climate/disaster/', color: '#2B2B2B' }
                ];

                document.getElementById('reportGrid').innerHTML = sectors.map(s => `
                    <a href="${s.href}" class="sector-report-card" style="border-left-color: ${s.color};">
                        <h3><i class="fa-solid ${s.icon}" style="color: ${s.color};"></i> ${s.name}</h3>
                        <p class="card-desc">View ${wardName}'s ${s.name.toLowerCase()} data</p>
                        <div class="card-link">
                            View details <i class="fa-solid fa-arrow-right"></i>
                        </div>
                    </a>
                `).join('');
            })();
        }
    </script>

</body>
</html>
