<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy & Buildings Ward Leaderboard | Bengaluru Climate | NOTF</title>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <meta name="description" content="Ward-level leaderboard for energy and buildings climate metrics in Bengaluru - see how all 369 wards rank on clean cooking, renewable energy, and more.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/climate/leaderboard.css">
    <link rel="stylesheet" href="/assets/i18n/language-selector.css">
</head>
<body>
    <div id="notf-header" data-city="bengaluru" data-city-subpage="climate"></div>
    <script src="/assets/js/components/header.js"></script>
<main>
        <!-- Sector Tabs -->
        <nav class="sector-tabs">
            <a href="/cities/bengaluru/climate/energy/" class="sector-tab active">
                <i class="fa-solid fa-bolt"></i> Energy
            </a>
            <a href="/cities/bengaluru/climate/transportation/" class="sector-tab">
                <i class="fa-solid fa-bus"></i> Transport
            </a>
            <a href="/cities/bengaluru/climate/waste/" class="sector-tab">
                <i class="fa-solid fa-recycle"></i> Waste
            </a>
            <a href="/cities/bengaluru/climate/air-quality/" class="sector-tab">
                <i class="fa-solid fa-wind"></i> Air
            </a>
            <a href="/cities/bengaluru/climate/water/" class="sector-tab">
                <i class="fa-solid fa-droplet"></i> Water
            </a>
            <a href="/cities/bengaluru/climate/greening/" class="sector-tab">
                <i class="fa-solid fa-tree"></i> Greening
            </a>
            <a href="/cities/bengaluru/climate/disaster/" class="sector-tab">
                <i class="fa-solid fa-triangle-exclamation"></i> Disaster
            </a>
        </nav>

        <!-- Hero -->
        <section class="leaderboard-hero">
            <div class="breadcrumb" style="margin-bottom: var(--space-md);">
                <a href="/">Home</a> /
                <a href="/cities/bengaluru/">Bengaluru</a> /
                <a href="/cities/bengaluru/climate/">Climate</a> /
                <a href="/cities/bengaluru/climate/energy/" data-i18n="bengaluru.climate.energy.leaderboard.breadcrumb.energy">Energy & Buildings</a> /
                <span data-i18n="bengaluru.climate.energy.leaderboard.breadcrumb.current">Leaderboard</span>
            </div>
            <h1>
                <i class="fa-solid fa-trophy"></i>
                <span data-i18n="bengaluru.climate.energy.leaderboard.hero.title">Ward Leaderboard</span>
            </h1>
            <p data-i18n="bengaluru.climate.energy.leaderboard.hero.description">Compare performance across all 369 wards on energy and buildings climate metrics</p>
        </section>

        <!-- Controls -->
        <section class="leaderboard-controls">
            <div class="controls-container">
                <div class="control-group">
                    <label for="metricSelect">
                        <i class="fa-solid fa-chart-line"></i>
                        <span data-i18n="bengaluru.climate.energy.leaderboard.controls.metricLabel">Metric:</span>
                    </label>
                    <select id="metricSelect" class="control-select">
                        <option value="clean_cooking" data-i18n="bengaluru.climate.energy.leaderboard.metrics.cleanCooking">Clean Cooking (% using solid fuels)</option>
                        <option value="renewable_energy" data-i18n="bengaluru.climate.energy.leaderboard.metrics.renewableEnergy">Renewable Energy (% share)</option>
                        <option value="electricity_consumption" data-i18n="bengaluru.climate.energy.leaderboard.metrics.electricityConsumption">Electricity Use (kWh/capita)</option>
                        <option value="green_buildings" data-i18n="bengaluru.climate.energy.leaderboard.metrics.greenBuildings">Green Buildings (certified)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="corpFilter">
                        <i class="fa-solid fa-filter"></i>
                        <span data-i18n="bengaluru.climate.energy.leaderboard.controls.filterLabel">Filter:</span>
                    </label>
                    <select id="corpFilter" class="control-select">
                        <option value="all" data-i18n="bengaluru.climate.energy.leaderboard.corporations.all">All Corporations (369 wards)</option>
                        <option value="Central" data-i18n="bengaluru.climate.energy.leaderboard.corporations.central">Central (63 wards)</option>
                        <option value="East" data-i18n="bengaluru.climate.energy.leaderboard.corporations.east">East (50 wards)</option>
                        <option value="West" data-i18n="bengaluru.climate.energy.leaderboard.corporations.west">West (112 wards)</option>
                        <option value="North" data-i18n="bengaluru.climate.energy.leaderboard.corporations.north">North (72 wards)</option>
                        <option value="South" data-i18n="bengaluru.climate.energy.leaderboard.corporations.south">South (72 wards)</option>
                    </select>
                </div>

                <div class="leaderboard-stats">
                    <span>
                        <i class="fa-solid fa-map"></i>
                        <strong id="wardCount">369</strong> <span data-i18n="bengaluru.climate.energy.leaderboard.controls.wardCount">wards</span>
                    </span>
                </div>
            </div>
        </section>

        <!-- Leaderboard Table -->
        <section class="leaderboard-section">
            <div class="leaderboard-container">
                <div id="leaderboardTable"></div>

                <div style="text-align: center; margin-top: var(--space-xl);">
                    <a href="/cities/bengaluru/climate/energy/" class="btn btn-secondary">
                        <i class="fa-solid fa-arrow-left"></i>
                        <span data-i18n="bengaluru.climate.energy.leaderboard.backButton">Back to Energy & Buildings</span>
                    </a>
                </div>
            </div>
        </section>
    </main>


    <div id="notf-chatbot"></div>
    <script src="/assets/js/components/chatbot-loader.js"></script>

    <div id="notf-footer"></div>
    <script src="/assets/js/components/footer.js"></script>

    <!-- Climate Data & Leaderboard -->
    <script src="/assets/js/climate/data-loader.js"></script>
    <script src="/assets/js/climate/leaderboard.js"></script>

    <script>
        // Define energy sector metrics
        const ENERGY_METRICS = [
            {
                key: 'solid_fuel_households',
                name: 'Clean Cooking',
                unit: '%',
                path: 'percentage',
                inverted: true // Lower is better
            },
            {
                key: 'renewable_energy_share',
                name: 'Renewable Energy',
                unit: '%',
                path: 'percentage',
                inverted: false
            },
            {
                key: 'electricity_consumption_kwh',
                name: 'Electricity Use',
                unit: ' kWh/capita',
                path: 'per_capita',
                inverted: true // Lower is better
            },
            {
                key: 'green_buildings',
                name: 'Green Buildings',
                unit: ' certified',
                path: 'count',
                inverted: false
            }
        ];

        let leaderboard;

        // Initialize leaderboard
        document.addEventListener('DOMContentLoaded', () => {
            leaderboard = new WardLeaderboard('leaderboardTable', {
                sector: 'energy_buildings',
                sectorSlug: 'energy',
                defaultMetric: 'solid_fuel_households',
                metrics: ENERGY_METRICS
            });

            // Metric selector
            const metricSelect = document.getElementById('metricSelect');
            metricSelect.addEventListener('change', (e) => {
                const metricKey = e.target.value;
                leaderboard.updateMetric(metricKey);
            });

            // Corporation filter
            const corpFilter = document.getElementById('corpFilter');
            corpFilter.addEventListener('change', (e) => {
                const corp = e.target.value;
                leaderboard.updateCorporation(corp);

                // Update ward count
                const count = corp === 'all' ? 369 : getCorporationWardCount(corp);
                document.getElementById('wardCount').textContent = count;
            });
        });

        function getCorporationWardCount(corp) {
            const counts = {
                'Central': 63,
                'East': 50,
                'West': 112,
                'North': 72,
                'South': 72
            };
            return counts[corp] || 369;
        }
    </script>

    <script src="/assets/js/components/common-scripts.js"></script>
</body>
</html>
