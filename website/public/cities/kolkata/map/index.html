<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolkata Ward Map | NOTF</title>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <meta name="description" content="Explore all 144 electoral wards in Kolkata with interactive boundaries and community locations.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/i18n/language-selector.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Breadcrumb */
        .breadcrumb {
            background: var(--warm-cream);
            padding: var(--space-md);
            border-bottom: 1px solid #e0e0e0;
        }

        .breadcrumb a {
            color: #F5B82E;
            text-decoration: none;
            font-weight: 600;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span {
            color: var(--color-text-light);
            margin: 0 0.5rem;
        }

        /* Page Header */
        .page-header {
            background: #F5B82E;
            color: var(--warm-cream);
            padding: var(--space-lg) var(--space-md);
            text-align: center;
        }

        .page-header h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--warm-cream);
        }

        .page-header .lead {
            font-size: 18px;
            opacity: 0.95;
        }

        /* Map Container */
        #map {
            width: 100%;
            height: 600px;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .map-container {
            padding: var(--space-lg) var(--space-md);
            max-width: 1400px;
            margin: 0 auto;
        }

        .map-legend {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 1rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 0.5rem 0;
        }

        .legend-marker {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 0.75rem;
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .legend-marker.community {
            background-color: #F5B82E;
        }

        .map-stats {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .map-stat-card {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 150px;
        }

        .map-stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #F5B82E;
        }

        .map-stat-label {
            color: #666;
            font-size: 0.9rem;
        }

        /* Leaflet Popup Styling */
        .leaflet-popup-content {
            min-width: 200px;
        }

        .popup-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .popup-type {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background-color: #F5B82E;
            color: white;
        }

        .popup-info {
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }

        .popup-contact {
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        .popup-contact a {
            color: #F5B82E;
            text-decoration: none;
        }

        .popup-contact a:hover {
            text-decoration: underline;
        }

        /* Ward tooltip styling */
        .ward-tooltip {
            background-color: #F5B82EF2;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .ward-tooltip::before {
            border-top-color: #F5B82EF2;
        }
    </style>
    <link rel="stylesheet" href="/assets/chat/chat.css">
</head>
<body>
    <div id="notf-header" data-city="kolkata" data-city-subpage="map"></div>
    <script src="/assets/js/components/header.js"></script>
<main>
        <!-- Breadcrumb -->
        <div class="breadcrumb">
            <a href="/">Home</a>
            <span>›</span>
            <a href="/cities/kolkata/">Kolkata</a>
            <span>›</span>
            <span style="color: var(--charcoal);">Ward Map</span>
        </div>

        <!-- Page Header -->
        <section class="page-header">
            <h1><i class="fa-solid fa-map-location-dot"></i> Kolkata Ward Map</h1>
            <p class="lead">Explore all 144 electoral wards with interactive boundaries</p>
        </section>

        <!-- Map Section -->
        <div class="map-container">
            <div class="map-stats">
                <div class="map-stat-card">
                    <div class="map-stat-number" id="wardCount">144</div>
                    <div class="map-stat-label">Electoral Wards</div>
                </div>
                <div class="map-stat-card">
                    <div class="map-stat-number" id="commCount">-</div>
                    <div class="map-stat-label">Communities Mapped</div>
                </div>
            </div>

            <div id="map"></div>

            <div class="map-legend">
                <h3 style="margin-bottom: 0.75rem; font-size: 1rem;">Legend</h3>
                <div class="legend-item">
                    <div class="legend-marker community"></div>
                    <span>Community Initiative</span>
                </div>
                <div class="legend-item" style="margin-top: 0.75rem;">
                    <div style="width: 20px; height: 2px; background: #F5B82E; opacity: 0.6; margin-right: 0.75rem;"></div>
                    <span>Ward Boundaries (hover to see ward name)</span>
                </div>
            </div>
        </div>

</main>


    <div id="notf-chatbot"></div>
    <script src="/assets/js/components/chatbot-loader.js"></script>

    <div id="notf-footer"></div>
    <script src="/assets/js/components/footer.js"></script>

    <!-- Leaflet JS -->

    <!-- Load Supabase and data -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/data-loader.js"></script>
    <script>
        // Initialize the map centered on Kolkata
        const map = L.map('map').setView([22.5726, 88.3639], 11);

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);

        // Custom community marker icon
        const communityIcon = L.divIcon({
            className: 'custom-marker',
            html: '<div style="background-color: #F5B82E; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 3px 8px rgba(0,0,0,0.4);"></div>',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });

        // Get coordinates for a community
        function getCoordinates(item) {
            // Use database coordinates if available
            if (item.latitude && item.longitude) {
                return {
                    lat: parseFloat(item.latitude),
                    lng: parseFloat(item.longitude)
                };
            }

            // Fallback to city center with random offset
            const offset = Math.random() * 0.02 - 0.01;
            return {
                lat: 22.5726 + offset,
                lng: 88.3639 + offset
            };
        }

        // Create popup content
        function createPopupContent(comm) {
            let html = `
                <div class="popup-title">${comm.name}</div>
                <span class="popup-type">Community</span>
            `;

            html += `<div class="popup-info"><i class="fa-solid fa-location-dot"></i> ${comm.city || 'Kolkata'}${comm.state ? ', ' + comm.state : ''}</div>`;

            if (comm.themes && comm.themes.length > 0) {
                html += `<div class="popup-info"><strong>Focus:</strong> ${comm.themes.slice(0, 3).join(', ')}</div>`;
            }

            if (comm.description) {
                const shortDesc = comm.description.length > 100
                    ? comm.description.substring(0, 100) + '...'
                    : comm.description;
                html += `<div class="popup-info">${shortDesc}</div>`;
            }

            if (comm.contact && comm.contact.email) {
                html += `<div class="popup-contact"><i class="fa-solid fa-envelope"></i> <a href="mailto:${comm.contact.email}">${comm.contact.email}</a></div>`;
            }

            return html;
        }

        // Create tooltip content (shows on hover)
        function createTooltipContent(comm) {
            let tooltip = `<strong>${comm.name}</strong>`;

            if (comm.ward) {
                tooltip += `<br><i class="fa-solid fa-location-dot"></i> ${comm.ward}`;
            } else if (comm.neighborhood) {
                tooltip += `<br><i class="fa-solid fa-location-dot"></i> ${comm.neighborhood}`;
            }

            return tooltip;
        }

        // Load and display data
        (async function() {
            await dataLoader.waitForSupabase();

            // Load Kolkata ward boundaries (GeoJSON)
            try {
                console.log('Loading Kolkata ward boundaries...');
                const response = await fetch('/assets/data/boundaries/kolkata-wards.geojson');
                const geojson = await response.json();

                L.geoJSON(geojson, {
                    style: {
                        color: '#F5B82E',
                        weight: 1.5,
                        fillOpacity: 0.05,
                        fillColor: '#F5B82E',
                        opacity: 0.6
                    },
                    onEachFeature: function(feature, layer) {
                        if (feature.properties) {
                            const props = feature.properties;
                            const wardName = props.name || props.Name || props.WARD_NAME || props.ward_name || 'Ward';
                            const wardNumber = props.number || props.Number || props.WARD_NO || props.ward_no || '';

                            let tooltipText = '';
                            if (wardNumber) {
                                tooltipText = `Ward ${wardNumber}`;
                                if (wardName && wardName !== 'Ward') {
                                    tooltipText += ` - ${wardName}`;
                                }
                            } else if (wardName) {
                                tooltipText = wardName;
                            }

                            if (tooltipText) {
                                layer.bindTooltip(tooltipText, {
                                    permanent: false,
                                    direction: 'center',
                                    className: 'ward-tooltip'
                                });
                            }
                        }
                    }
                }).addTo(map);

                console.log('✅ Ward boundaries loaded successfully');
            } catch (error) {
                console.error('❌ Error loading ward boundaries:', error);
            }

            // Load and filter communities to Kolkata only
            const allCommunities = await dataLoader.loadCommunities();
            const cityCommunities = allCommunities.filter(comm =>
                comm.city && (
                    comm.city.toLowerCase().includes('kolkata') ||
                    comm.city.toLowerCase().includes('kolkata')
                )
            );

            console.log(`Found ${cityCommunities.length} communities in Kolkata`);
            document.getElementById('commCount').textContent = cityCommunities.length;

            // Add community markers
            let markerCount = 0;
            cityCommunities.forEach(comm => {
                const coords = getCoordinates(comm);
                if (coords) {
                    L.marker([coords.lat, coords.lng], { icon: communityIcon })
                        .addTo(map)
                        .bindPopup(createPopupContent(comm))
                        .bindTooltip(createTooltipContent(comm), {
                            direction: 'top',
                            offset: [0, -10],
                            opacity: 0.9
                        });
                    markerCount++;
                }
            });

            console.log(`Mapped ${markerCount} Kolkata communities`);

            // Make Kolkata data available to chatbot
            window.notfData = {
                communities: cityCommunities,
                members: [],
                city: 'kolkata'
            };
        })();
    </script>


    <script src="/assets/js/components/common-scripts.js"></script>
</body>
</html>
