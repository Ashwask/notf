<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 600 500" width="600" height="500">
  <title>Nudge Unit Illustration</title>
  <desc>The Nudge Unit as central facilitator connecting communities, knowledge, resources, and services</desc>

  <!-- Background -->
  <rect width="600" height="500" fill="#FAF6E8"/>

  <!-- Connection lines (drawn first, behind icons) -->
  <line x1="170" y1="130" x2="260" y2="210" stroke="#B9C98A" stroke-width="3" opacity="0.5" stroke-dasharray="8,4"/>
  <line x1="430" y1="130" x2="340" y2="210" stroke="#B9C98A" stroke-width="3" opacity="0.5" stroke-dasharray="8,4"/>
  <line x1="170" y1="370" x2="260" y2="280" stroke="#B9C98A" stroke-width="3" opacity="0.5" stroke-dasharray="8,4"/>
  <line x1="430" y1="370" x2="340" y2="280" stroke="#B9C98A" stroke-width="3" opacity="0.5" stroke-dasharray="8,4"/>

  <!-- Central circle (Nudge Unit hub) -->
  <circle cx="300" cy="245" r="70" fill="#2F4A2C" opacity="0.1"/>
  <circle cx="300" cy="245" r="55" fill="#2F4A2C" opacity="0.15"/>

  <!-- Central icon: Collaboration (the facilitator) -->
  <image href="/assets/images/icons/collaboration.svg" x="255" y="200" width="90" height="90"/>

  <!-- Top-left: Knowledge/Directory -->
  <circle cx="130" cy="110" r="50" fill="#3F5F7A" opacity="0.08"/>
  <image href="/assets/images/icons/knowledge.svg" x="95" y="75" width="70" height="70"/>
  <text x="130" y="170" font-family="'Okta Neue', -apple-system, sans-serif" font-size="13" fill="#3F5F7A" text-anchor="middle" font-weight="600">Knowledge</text>

  <!-- Top-right: Toolkit/Resources -->
  <circle cx="470" cy="110" r="50" fill="#C45A2A" opacity="0.08"/>
  <image href="/assets/images/icons/toolkit.svg" x="435" y="75" width="70" height="70"/>
  <text x="470" y="170" font-family="'Okta Neue', -apple-system, sans-serif" font-size="13" fill="#C45A2A" text-anchor="middle" font-weight="600">Toolkit</text>

  <!-- Bottom-left: Community -->
  <circle cx="130" cy="380" r="50" fill="#C45A2A" opacity="0.08"/>
  <image href="/assets/images/icons/community.svg" x="95" y="345" width="70" height="70"/>
  <text x="130" y="440" font-family="'Okta Neue', -apple-system, sans-serif" font-size="13" fill="#C45A2A" text-anchor="middle" font-weight="600">Community</text>

  <!-- Bottom-right: Services/Support -->
  <circle cx="470" cy="380" r="50" fill="#F5B82E" opacity="0.1"/>
  <image href="/assets/images/icons/services.svg" x="435" y="345" width="70" height="70"/>
  <text x="470" y="440" font-family="'Okta Neue', -apple-system, sans-serif" font-size="13" fill="#F5B82E" text-anchor="middle" font-weight="700">Services</text>

  <!-- Title -->
  <text x="300" y="475" font-family="'Okta Neue', -apple-system, sans-serif" font-size="18" font-weight="600" fill="#2F4A2C" text-anchor="middle">The Nudge Unit: Your First Point of Contact</text>
</svg>
