<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <title>Join Process Illustration</title>
  <desc>4-step journey visualization: Chat, Documentation, Participation, Support</desc>

  <!-- Background -->
  <rect width="800" height="300" fill="#FAF6E8"/>

  <!-- Step 1: Chat -->
  <circle cx="100" cy="150" r="50" fill="#B9C98A"/>
  <rect x="80" y="135" width="40" height="30" rx="4" fill="#FAF6E8"/>
  <circle cx="85" cy="143" r="3" fill="#B9C98A"/>
  <circle cx="95" cy="143" r="3" fill="#B9C98A"/>
  <circle cx="105" cy="143" r="3" fill="#B9C98A"/>
  <text x="100" y="230" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#2F4A2C" text-anchor="middle">1. Initial Chat</text>
  <text x="100" y="250" font-family="Arial, sans-serif" font-size="12" fill="#2B2B2B" text-anchor="middle" opacity="0.7">Connect with us</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="150" x2="240" y2="150" stroke="#2F4A2C" stroke-width="3"/>
  <path d="M 240,150 L 232,145 L 232,155 Z" fill="#2F4A2C"/>

  <!-- Step 2: Documentation -->
  <circle cx="300" cy="150" r="50" fill="#C45A2A"/>
  <rect x="280" y="135" width="40" height="30" rx="2" fill="#FAF6E8"/>
  <line x1="285" y1="143" x2="315" y2="143" stroke="#C45A2A" stroke-width="2"/>
  <line x1="285" y1="150" x2="315" y2="150" stroke="#C45A2A" stroke-width="2"/>
  <line x1="285" y1="157" x2="310" y2="157" stroke="#C45A2A" stroke-width="2"/>
  <text x="300" y="230" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#2F4A2C" text-anchor="middle">2. Document</text>
  <text x="300" y="250" font-family="Arial, sans-serif" font-size="12" fill="#2B2B2B" text-anchor="middle" opacity="0.7">Gives & Asks</text>

  <!-- Arrow 2 -->
  <line x1="350" y1="150" x2="440" y2="150" stroke="#2F4A2C" stroke-width="3"/>
  <path d="M 440,150 L 432,145 L 432,155 Z" fill="#2F4A2C"/>

  <!-- Step 3: Participation -->
  <circle cx="500" cy="150" r="50" fill="#3F5F7A"/>
  <circle cx="485" cy="145" r="10" fill="#FAF6E8"/>
  <circle cx="515" cy="145" r="10" fill="#FAF6E8"/>
  <circle cx="500" cy="165" r="10" fill="#FAF6E8"/>
  <line x1="485" y1="145" x2="500" y2="165" stroke="#FAF6E8" stroke-width="2"/>
  <line x1="515" y1="145" x2="500" y2="165" stroke="#FAF6E8" stroke-width="2"/>
  <text x="500" y="230" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#2F4A2C" text-anchor="middle">3. Participate</text>
  <text x="500" y="250" font-family="Arial, sans-serif" font-size="12" fill="#2B2B2B" text-anchor="middle" opacity="0.7">Collaborate</text>

  <!-- Arrow 3 -->
  <line x1="550" y1="150" x2="640" y2="150" stroke="#2F4A2C" stroke-width="3"/>
  <path d="M 640,150 L 632,145 L 632,155 Z" fill="#2F4A2C"/>

  <!-- Step 4: Support -->
  <circle cx="700" cy="150" r="50" fill="#F5B82E"/>
  <path d="M 690,145 L 690,165 L 705,160 L 720,165 L 720,145 L 705,150 Z" fill="#2F4A2C"/>
  <text x="700" y="230" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#2F4A2C" text-anchor="middle">4. Support</text>
  <text x="700" y="250" font-family="Arial, sans-serif" font-size="12" fill="#2B2B2B" text-anchor="middle" opacity="0.7">Ongoing</text>

  <!-- Decorative path showing journey -->
  <path d="M 50,80 Q 400,50 750,80" stroke="#2F4A2C" stroke-width="2" fill="none" opacity="0.2" stroke-dasharray="8,4"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#2F4A2C" text-anchor="middle">Your Journey with NoTF</text>
</svg>
