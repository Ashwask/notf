<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <title>Adaptable Icon</title>
  <desc>Flexible modular blocks - adaptable by design</desc>

  <!-- Modular blocks in flexible arrangement -->
  <rect x="20" y="20" width="35" height="35" rx="4" fill="#F5B82E"/>
  <rect x="65" y="15" width="40" height="30" rx="4" fill="#F5B82E" opacity="0.7"/>
  <rect x="15" y="65" width="30" height="40" rx="4" fill="#F5B82E" opacity="0.5"/>
  <rect x="55" y="55" width="35" height="35" rx="4" fill="#F5B82E"/>
  <rect x="73" y="73" width="35" height="35" rx="4" fill="#F5B82E" opacity="0.8"/>

  <!-- Connection lines showing flexibility -->
  <path d="M 37,55 L 55,72" stroke="#2F4A2C" stroke-width="3" stroke-dasharray="5,5" opacity="0.6"/>
  <path d="M 85,45 L 72,55" stroke="#2F4A2C" stroke-width="3" stroke-dasharray="5,5" opacity="0.6"/>
  <path d="M 45,95 L 72,72" stroke="#2F4A2C" stroke-width="3" stroke-dasharray="5,5" opacity="0.6"/>
</svg>
