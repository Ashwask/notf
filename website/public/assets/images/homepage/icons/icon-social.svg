<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <title>Social Infrastructure Icon</title>
  <desc>Network and community - trust networks</desc>

  <!-- Network nodes (people) -->
  <circle cx="35" cy="35" r="12" fill="#B9C98A"/>
  <circle cx="93" cy="35" r="12" fill="#B9C98A"/>
  <circle cx="64" cy="64" r="14" fill="#2F4A2C"/>
  <circle cx="30" cy="93" r="12" fill="#B9C98A"/>
  <circle cx="98" cy="93" r="12" fill="#B9C98A"/>

  <!-- Connection lines -->
  <line x1="35" y1="35" x2="64" y2="64" stroke="#3F5F7A" stroke-width="3"/>
  <line x1="93" y1="35" x2="64" y2="64" stroke="#3F5F7A" stroke-width="3"/>
  <line x1="64" y1="64" x2="30" y2="93" stroke="#3F5F7A" stroke-width="3"/>
  <line x1="64" y1="64" x2="98" y2="93" stroke="#3F5F7A" stroke-width="3"/>
  <line x1="35" y1="35" x2="93" y2="35" stroke="#3F5F7A" stroke-width="2" opacity="0.5"/>
  <line x1="30" y1="93" x2="98" y2="93" stroke="#3F5F7A" stroke-width="2" opacity="0.5"/>

  <!-- Inner person icons (simplified) -->
  <circle cx="35" cy="32" r="4" fill="#FAF6E8"/>
  <circle cx="93" cy="32" r="4" fill="#FAF6E8"/>
  <circle cx="64" cy="60" r="5" fill="#FAF6E8"/>
  <circle cx="30" cy="90" r="4" fill="#FAF6E8"/>
  <circle cx="98" cy="90" r="4" fill="#FAF6E8"/>
</svg>
