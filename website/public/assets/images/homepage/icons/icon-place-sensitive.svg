<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <title>Place-Sensitive Icon</title>
  <desc>Location pin with roots - grounded in local context</desc>

  <!-- Location pin shape -->
  <path d="M 64,10 C 48,10 35,23 35,39 C 35,55 64,75 64,75 C 64,75 93,55 93,39 C 93,23 80,10 64,10 Z" fill="#C45A2A"/>

  <!-- Heart/center circle -->
  <circle cx="64" cy="39" r="12" fill="#FAF6E8"/>

  <!-- Roots extending downward -->
  <path d="M 64,75 Q 50,90 45,110" stroke="#2F4A2C" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 64,75 Q 64,95 64,118" stroke="#2F4A2C" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 64,75 Q 78,90 83,110" stroke="#2F4A2C" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Small root endpoints -->
  <circle cx="45" cy="110" r="4" fill="#2F4A2C"/>
  <circle cx="64" cy="118" r="4" fill="#2F4A2C"/>
  <circle cx="83" cy="110" r="4" fill="#2F4A2C"/>
</svg>
