<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#3F5F7A"/>
  <!-- Geometric shapes -->
  <circle cx="60" cy="50" r="80" fill="#B9C98A" opacity="0.1"/>
  <circle cx="350" cy="240" r="60" fill="#F5B82E" opacity="0.1"/>
  <!-- Plate -->
  <ellipse cx="200" cy="150" rx="70" ry="65" fill="#FAF6E8" opacity="0.15"/>
  <ellipse cx="200" cy="150" rx="50" ry="46" fill="#FAF6E8" opacity="0.1"/>
  <!-- Spoon -->
  <g transform="translate(120, 80)">
    <ellipse cx="0" cy="0" rx="10" ry="16" fill="#FAF6E8" opacity="0.8"/>
    <rect x="-3" y="14" width="6" height="55" rx="3" fill="#FAF6E8" opacity="0.8"/>
  </g>
  <!-- Fork -->
  <g transform="translate(280, 80)">
    <rect x="-8" y="0" width="3" height="22" rx="1.5" fill="#FAF6E8" opacity="0.8"/>
    <rect x="-2" y="0" width="3" height="22" rx="1.5" fill="#FAF6E8" opacity="0.8"/>
    <rect x="4" y="0" width="3" height="22" rx="1.5" fill="#FAF6E8" opacity="0.8"/>
    <rect x="-3" y="20" width="9" height="50" rx="3" fill="#FAF6E8" opacity="0.8"/>
  </g>
  <!-- Decorative -->
  <rect x="320" y="60" width="12" height="12" fill="#B9C98A" opacity="0.25" transform="rotate(45 326 66)"/>
  <circle cx="80" cy="200" r="5" fill="#C45A2A" opacity="0.3"/>
  <polygon points="160,40 168,25 176,40" fill="#F5B82E" opacity="0.2"/>
</svg>