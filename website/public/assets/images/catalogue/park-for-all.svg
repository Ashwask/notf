<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#2F4A2C"/>
  <circle cx="340" cy="60" r="80" fill="#B9C98A" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#F5B82E" opacity="0.08"/>
  <!-- Park bench + tree icon -->
  <g transform="translate(200, 140)">
    <!-- Tree -->
    <circle cx="0" cy="-45" r="35" fill="#FAF6E8" opacity="0.7"/>
    <circle cx="-20" cy="-35" r="25" fill="#FAF6E8" opacity="0.5"/>
    <circle cx="20" cy="-35" r="25" fill="#FAF6E8" opacity="0.5"/>
    <rect x="-4" y="-15" width="8" height="45" rx="3" fill="#FAF6E8" opacity="0.6"/>
    <!-- Bench -->
    <rect x="-40" y="25" width="80" height="6" rx="2" fill="#FAF6E8" opacity="0.8"/>
    <rect x="-35" y="31" width="6" height="16" rx="2" fill="#FAF6E8" opacity="0.6"/>
    <rect x="29" y="31" width="6" height="16" rx="2" fill="#FAF6E8" opacity="0.6"/>
    <!-- Small person sitting -->
    <circle cx="50" cy="15" r="6" fill="#FAF6E8" opacity="0.4"/>
    <rect x="47" y="22" width="6" height="10" rx="2" fill="#FAF6E8" opacity="0.3"/>
  </g>
  <rect x="60" y="90" width="12" height="12" fill="#B9C98A" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#FAF6E8" opacity="0.1"/>
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">A Park for All</text>
</svg>
