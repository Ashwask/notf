<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#2F4A2C"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#B9C98A" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#F5B82E" opacity="0.08"/>
  <!-- Jar / Container (Gullak) icon -->
  <g transform="translate(200, 150)">
    <!-- Jar lid -->
    <rect x="-30" y="-65" width="60" height="12" rx="4" fill="#FAF6E8" opacity="0.85"/>
    <!-- Jar lid rim -->
    <rect x="-35" y="-55" width="70" height="6" rx="3" fill="#FAF6E8" opacity="0.7"/>
    <!-- Coin slot on lid -->
    <rect x="-15" y="-62" width="30" height="5" rx="2" fill="#2F4A2C" opacity="0.5"/>
    <!-- Jar body -->
    <path d="M-35,-49 C-40,-49 -45,-30 -45,10 C-45,50 -40,60 -30,65 L30,65 C40,60 45,50 45,10 C45,-30 40,-49 35,-49 Z" fill="#FAF6E8" opacity="0.7"/>
    <!-- Recycle symbol inside jar -->
    <path d="M0,-15 L8,0 L-8,0 Z" fill="#B9C98A" opacity="0.6"/>
    <path d="M8,0 L16,15 L0,15 Z" fill="#B9C98A" opacity="0.5"/>
    <path d="M-8,0 L0,15 L-16,15 Z" fill="#B9C98A" opacity="0.5"/>
    <!-- Arrows on recycle -->
    <path d="M-2,-18 L0,-10 L5,-16" fill="none" stroke="#B9C98A" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <path d="M12,2 L16,10 L8,8" fill="none" stroke="#B9C98A" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <path d="M-10,12 L-16,8 L-10,4" fill="none" stroke="#B9C98A" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <!-- Coins floating above -->
    <circle cx="-20" cy="-80" r="8" fill="#F5B82E" opacity="0.5"/>
    <circle cx="15" cy="-85" r="6" fill="#F5B82E" opacity="0.4"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#B9C98A" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#F5B82E" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Recycling Gullaks</text>
</svg>