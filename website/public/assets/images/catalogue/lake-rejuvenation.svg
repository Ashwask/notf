<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#3F5F7A"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#B9C98A" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#FAF6E8" opacity="0.08"/>
  <!-- Water/Lake icon with waves -->
  <g transform="translate(200, 140)">
    <!-- Water drop -->
    <path d="M0,-60 C-8,-40 -30,-10 -30,15 C-30,32 -17,50 0,50 C17,50 30,32 30,15 C30,-10 8,-40 0,-60 Z" fill="#FAF6E8" opacity="0.8"/>
    <!-- Inner drop highlight -->
    <ellipse cx="-8" cy="18" rx="8" ry="12" fill="#3F5F7A" opacity="0.3"/>
    <!-- Wave 1 -->
    <path d="M-70,65 C-50,50 -30,80 -10,65 C10,50 30,80 50,65 C70,50 90,80 110,65" fill="none" stroke="#FAF6E8" stroke-width="4" opacity="0.6" stroke-linecap="round" transform="translate(-20,0)"/>
    <!-- Wave 2 -->
    <path d="M-70,85 C-50,70 -30,100 -10,85 C10,70 30,100 50,85 C70,70 90,100 110,85" fill="none" stroke="#FAF6E8" stroke-width="3.5" opacity="0.4" stroke-linecap="round" transform="translate(-20,0)"/>
    <!-- Wave 3 -->
    <path d="M-70,105 C-50,90 -30,120 -10,105 C10,90 30,120 50,105 C70,90 90,120 110,105" fill="none" stroke="#FAF6E8" stroke-width="3" opacity="0.25" stroke-linecap="round" transform="translate(-20,0)"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#FAF6E8" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#B9C98A" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Lake Rejuvenation</text>
</svg>