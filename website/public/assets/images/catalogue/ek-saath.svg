<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#2F4A2C"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="90" fill="#B9C98A" opacity="0.1"/>
  <circle cx="50" cy="310" r="70" fill="#F5B82E" opacity="0.08"/>
  <!-- Tree with leaves -->
  <g transform="translate(200, 140)">
    <!-- Trunk -->
    <rect x="-8" y="20" width="16" height="60" rx="4" fill="#FAF6E8" opacity="0.6"/>
    <!-- Canopy layers (leaf clusters) -->
    <ellipse cx="0" cy="-30" rx="50" ry="35" fill="#B9C98A" opacity="0.6"/>
    <ellipse cx="-25" cy="0" rx="35" ry="28" fill="#B9C98A" opacity="0.5"/>
    <ellipse cx="25" cy="0" rx="35" ry="28" fill="#B9C98A" opacity="0.5"/>
    <ellipse cx="0" cy="-10" rx="40" ry="30" fill="#FAF6E8" opacity="0.3"/>
    <!-- Leaf detail -->
    <path d="M-15,-45 C-5,-60 5,-60 15,-45" fill="none" stroke="#FAF6E8" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <!-- Small leaves floating -->
    <path d="M55,-10 C60,-20 70,-15 65,-5 C60,5 50,0 55,-10Z" fill="#FAF6E8" opacity="0.35"/>
    <path d="M-60,10 C-55,0 -45,5 -50,15 C-55,25 -65,20 -60,10Z" fill="#FAF6E8" opacity="0.3"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="310" y="220" width="10" height="10" fill="#F5B82E" opacity="0.2" transform="rotate(45 315 225)"/>
  <circle cx="80" cy="100" r="5" fill="#FAF6E8" opacity="0.15"/>
  <polygon points="110,260 118,245 126,260" fill="#B9C98A" opacity="0.15"/>
  <circle cx="320" cy="150" r="4" fill="#FAF6E8" opacity="0.12"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Ek Saath</text>
</svg>