<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#3F5F7A"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#F5B82E" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#FAF6E8" opacity="0.08"/>
  <!-- Bus / Road -->
  <g transform="translate(200, 150)">
    <!-- Road -->
    <rect x="-90" y="35" width="180" height="20" rx="3" fill="#FAF6E8" opacity="0.2"/>
    <!-- Road dashes -->
    <rect x="-70" y="42" width="20" height="6" rx="3" fill="#FAF6E8" opacity="0.15"/>
    <rect x="-20" y="42" width="20" height="6" rx="3" fill="#FAF6E8" opacity="0.15"/>
    <rect x="30" y="42" width="20" height="6" rx="3" fill="#FAF6E8" opacity="0.15"/>
    <!-- Bus body -->
    <rect x="-55" y="-40" width="110" height="65" rx="10" fill="#FAF6E8" opacity="0.8"/>
    <!-- Bus roof -->
    <rect x="-45" y="-50" width="90" height="15" rx="6" fill="#FAF6E8" opacity="0.6"/>
    <!-- Windows -->
    <rect x="-40" y="-30" width="22" height="25" rx="4" fill="#3F5F7A" opacity="0.4"/>
    <rect x="-11" y="-30" width="22" height="25" rx="4" fill="#3F5F7A" opacity="0.4"/>
    <rect x="18" y="-30" width="22" height="25" rx="4" fill="#3F5F7A" opacity="0.4"/>
    <!-- Windshield -->
    <rect x="-48" y="-28" width="5" height="28" rx="2" fill="#3F5F7A" opacity="0.35"/>
    <!-- Door -->
    <rect x="43" y="-25" width="10" height="35" rx="2" fill="#3F5F7A" opacity="0.35"/>
    <!-- Wheels -->
    <circle cx="-30" cy="30" r="12" fill="#FAF6E8" opacity="0.7"/>
    <circle cx="-30" cy="30" r="6" fill="#3F5F7A" opacity="0.4"/>
    <circle cx="30" cy="30" r="12" fill="#FAF6E8" opacity="0.7"/>
    <circle cx="30" cy="30" r="6" fill="#3F5F7A" opacity="0.4"/>
    <!-- Headlight -->
    <circle cx="-52" cy="10" r="4" fill="#F5B82E" opacity="0.6"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#FAF6E8" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#2B2B2B" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Shift Transport</text>
</svg>