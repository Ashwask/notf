<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#C45A2A"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#F5B82E" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#2F4A2C" opacity="0.08"/>
  <!-- Scroll / Document icon -->
  <g transform="translate(200, 150)">
    <!-- Main scroll body -->
    <rect x="-40" y="-65" width="80" height="130" rx="4" fill="#FAF6E8" opacity="0.8"/>
    <!-- Top scroll curl -->
    <ellipse cx="-40" cy="-65" rx="12" ry="18" fill="#FAF6E8" opacity="0.6"/>
    <ellipse cx="40" cy="-65" rx="12" ry="18" fill="#FAF6E8" opacity="0.6"/>
    <!-- Bottom scroll curl -->
    <ellipse cx="-40" cy="65" rx="12" ry="18" fill="#FAF6E8" opacity="0.6"/>
    <ellipse cx="40" cy="65" rx="12" ry="18" fill="#FAF6E8" opacity="0.6"/>
    <!-- Text lines on scroll -->
    <line x1="-25" y1="-40" x2="25" y2="-40" stroke="#C45A2A" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
    <line x1="-25" y1="-22" x2="25" y2="-22" stroke="#C45A2A" stroke-width="3" opacity="0.35" stroke-linecap="round"/>
    <line x1="-25" y1="-4" x2="15" y2="-4" stroke="#C45A2A" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
    <line x1="-25" y1="14" x2="25" y2="14" stroke="#C45A2A" stroke-width="3" opacity="0.35" stroke-linecap="round"/>
    <line x1="-25" y1="32" x2="20" y2="32" stroke="#C45A2A" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
    <!-- Seal / stamp -->
    <circle cx="18" cy="48" r="10" fill="#F5B82E" opacity="0.5"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#F5B82E" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#2B2B2B" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">74th Amendment</text>
</svg>