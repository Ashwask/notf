<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#2F4A2C"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#B9C98A" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#F5B82E" opacity="0.08"/>
  <!-- Graduation cap + people -->
  <g transform="translate(200, 140)">
    <!-- Graduation cap -->
    <polygon points="0,-55 -60,-30 0,-5 60,-30" fill="#FAF6E8" opacity="0.85"/>
    <rect x="-5" y="-45" width="10" height="20" fill="#FAF6E8" opacity="0.7"/>
    <line x1="0" y1="-55" x2="0" y2="-30" stroke="#FAF6E8" stroke-width="3" opacity="0.6"/>
    <!-- Tassel -->
    <line x1="60" y1="-30" x2="70" y2="-10" stroke="#FAF6E8" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
    <circle cx="70" cy="-8" r="4" fill="#FAF6E8" opacity="0.5"/>
    <!-- Person left -->
    <circle cx="-35" cy="30" r="14" fill="#FAF6E8" opacity="0.6"/>
    <path d="M-55,70 C-55,50 -15,50 -15,70" fill="#FAF6E8" opacity="0.5"/>
    <!-- Person center -->
    <circle cx="0" cy="25" r="16" fill="#FAF6E8" opacity="0.75"/>
    <path d="M-22,68 C-22,45 22,45 22,68" fill="#FAF6E8" opacity="0.65"/>
    <!-- Person right -->
    <circle cx="35" cy="30" r="14" fill="#FAF6E8" opacity="0.6"/>
    <path d="M15,70 C15,50 55,50 55,70" fill="#FAF6E8" opacity="0.5"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#B9C98A" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#FAF6E8" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">CC Fellowship</text>
</svg>