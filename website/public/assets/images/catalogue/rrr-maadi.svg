<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#C45A2A"/>
  <!-- Geometric shapes -->
  <circle cx="350" cy="40" r="90" fill="#F5B82E" opacity="0.15"/>
  <circle cx="50" cy="250" r="70" fill="#2F4A2C" opacity="0.12"/>
  <rect x="250" y="180" width="100" height="60" rx="6" fill="#FAF6E8" opacity="0.06" transform="rotate(12 300 210)"/>
  <!-- Wrench icon -->
  <g transform="translate(170, 120) rotate(-30)">
    <rect x="-6" y="-50" width="12" height="70" rx="4" fill="#FAF6E8" opacity="0.85"/>
    <circle cx="0" cy="-50" r="18" fill="none" stroke="#FAF6E8" stroke-width="8" opacity="0.85"/>
    <circle cx="0" cy="-50" r="8" fill="#C45A2A"/>
  </g>
  <!-- Circular arrows (repair/reuse) -->
  <g transform="translate(260, 100)">
    <path d="M0,-28 A28,28 0 1,1 -24,14" fill="none" stroke="#FAF6E8" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
    <polygon points="-28,8 -24,18 -16,10" fill="#FAF6E8" opacity="0.5"/>
  </g>
  <!-- Small shapes -->
  <rect x="60" y="80" width="14" height="14" fill="#F5B82E" opacity="0.3" transform="rotate(45 67 87)"/>
  <circle cx="100" cy="180" r="6" fill="#FAF6E8" opacity="0.15"/>
  <polygon points="330,140 340,125 350,140" fill="#FAF6E8" opacity="0.15"/>
</svg>