<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C45A2A"/>
      <stop offset="100%" stop-color="#3F5F7A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#bg5)"/>
  <!-- Geometric shapes -->
  <circle cx="330" cy="50" r="70" fill="#FAF6E8" opacity="0.08"/>
  <circle cx="70" cy="230" r="80" fill="#F5B82E" opacity="0.08"/>
  <!-- Heart (health) -->
  <g transform="translate(200, 110)">
    <path d="M0,20 C-10,5 -30,-10 -30,-25 C-30,-40 -15,-45 0,-30 C15,-45 30,-40 30,-25 C30,-10 10,5 0,20Z" fill="#FAF6E8" opacity="0.8" transform="scale(1.5)"/>
  </g>
  <!-- Plus/cross (health) -->
  <g transform="translate(100, 90)">
    <rect x="-4" y="-14" width="8" height="28" rx="3" fill="#FAF6E8" opacity="0.4"/>
    <rect x="-14" y="-4" width="28" height="8" rx="3" fill="#FAF6E8" opacity="0.4"/>
  </g>
  <!-- Shield outline -->
  <g transform="translate(300, 160)">
    <path d="M0,-25 L20,-15 L20,10 C20,25 0,35 0,35 C0,35 -20,25 -20,10 L-20,-15 Z" fill="none" stroke="#FAF6E8" stroke-width="2.5" opacity="0.3"/>
  </g>
  <!-- Small shapes -->
  <circle cx="60" cy="80" r="5" fill="#B9C98A" opacity="0.3"/>
  <rect x="340" y="220" width="12" height="12" fill="#FAF6E8" opacity="0.12" transform="rotate(45 346 226)"/>
  <polygon points="150,220 158,205 166,220" fill="#F5B82E" opacity="0.15"/>
</svg>