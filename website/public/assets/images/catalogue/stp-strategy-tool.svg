<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#2F4A2C"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#B9C98A" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#FAF6E8" opacity="0.08"/>
  <!-- Building / Water treatment icon -->
  <g transform="translate(200, 150)">
    <!-- Main building body -->
    <rect x="-45" y="-50" width="90" height="80" rx="4" fill="#FAF6E8" opacity="0.8"/>
    <!-- Building windows -->
    <rect x="-32" y="-38" width="16" height="14" rx="2" fill="#2F4A2C" opacity="0.4"/>
    <rect x="-8" y="-38" width="16" height="14" rx="2" fill="#2F4A2C" opacity="0.4"/>
    <rect x="16" y="-38" width="16" height="14" rx="2" fill="#2F4A2C" opacity="0.4"/>
    <rect x="-32" y="-16" width="16" height="14" rx="2" fill="#2F4A2C" opacity="0.4"/>
    <rect x="-8" y="-16" width="16" height="14" rx="2" fill="#2F4A2C" opacity="0.4"/>
    <rect x="16" y="-16" width="16" height="14" rx="2" fill="#2F4A2C" opacity="0.4"/>
    <!-- Chimney / tower -->
    <rect x="-12" y="-72" width="24" height="25" rx="3" fill="#FAF6E8" opacity="0.7"/>
    <!-- Water pipe coming out -->
    <rect x="45" y="0" width="40" height="10" rx="3" fill="#FAF6E8" opacity="0.6"/>
    <!-- Water drops from pipe -->
    <path d="M88,15 C86,22 82,28 85,32 C88,28 84,22 88,15 Z" fill="#FAF6E8" opacity="0.5"/>
    <path d="M78,18 C76,25 72,31 75,35 C78,31 74,25 78,18 Z" fill="#FAF6E8" opacity="0.4"/>
    <!-- Treatment waves below -->
    <path d="M-70,45 C-50,35 -30,55 -10,45 C10,35 30,55 50,45 C70,35 90,55 110,45" fill="none" stroke="#FAF6E8" stroke-width="3" opacity="0.4" stroke-linecap="round" transform="translate(-20,0)"/>
    <path d="M-70,60 C-50,50 -30,70 -10,60 C10,50 30,70 50,60 C70,50 90,70 110,60" fill="none" stroke="#FAF6E8" stroke-width="2.5" opacity="0.25" stroke-linecap="round" transform="translate(-20,0)"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#B9C98A" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#B9C98A" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">STP Strategy Tool</text>
</svg>