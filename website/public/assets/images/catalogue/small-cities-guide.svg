<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#3F5F7A"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#F5B82E" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#FAF6E8" opacity="0.08"/>
  <!-- Book / Handbook -->
  <g transform="translate(200, 150)">
    <!-- Book spine -->
    <rect x="-55" y="-65" width="12" height="130" rx="3" fill="#FAF6E8" opacity="0.7"/>
    <!-- Book front cover -->
    <rect x="-43" y="-60" width="90" height="120" rx="4" fill="#FAF6E8" opacity="0.8"/>
    <!-- Page lines -->
    <line x1="-28" y1="-35" x2="28" y2="-35" stroke="#3F5F7A" stroke-width="2.5" opacity="0.3"/>
    <line x1="-28" y1="-18" x2="28" y2="-18" stroke="#3F5F7A" stroke-width="2.5" opacity="0.3"/>
    <line x1="-28" y1="-1" x2="20" y2="-1" stroke="#3F5F7A" stroke-width="2.5" opacity="0.3"/>
    <line x1="-28" y1="16" x2="25" y2="16" stroke="#3F5F7A" stroke-width="2.5" opacity="0.3"/>
    <line x1="-28" y1="33" x2="15" y2="33" stroke="#3F5F7A" stroke-width="2.5" opacity="0.3"/>
    <!-- Bookmark ribbon -->
    <path d="M20,-60 L20,-75 L28,-65 L36,-75 L36,-60" fill="#C45A2A" opacity="0.6"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#FAF6E8" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#2B2B2B" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Small Cities Guide</text>
</svg>