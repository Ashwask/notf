<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#2F4A2C"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#B9C98A" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#FAF6E8" opacity="0.08"/>
  <!-- Globe with data points -->
  <g transform="translate(200, 145)">
    <!-- Globe circle -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#FAF6E8" stroke-width="3" opacity="0.7"/>
    <!-- Latitude lines -->
    <ellipse cx="0" cy="0" rx="60" ry="20" fill="none" stroke="#FAF6E8" stroke-width="2" opacity="0.3"/>
    <ellipse cx="0" cy="-25" rx="48" ry="12" fill="none" stroke="#FAF6E8" stroke-width="1.5" opacity="0.25"/>
    <ellipse cx="0" cy="25" rx="48" ry="12" fill="none" stroke="#FAF6E8" stroke-width="1.5" opacity="0.25"/>
    <!-- Meridian line -->
    <ellipse cx="0" cy="0" rx="20" ry="60" fill="none" stroke="#FAF6E8" stroke-width="2" opacity="0.3"/>
    <!-- Data points -->
    <circle cx="-20" cy="-18" r="5" fill="#F5B82E" opacity="0.8"/>
    <circle cx="25" cy="-8" r="4" fill="#F5B82E" opacity="0.7"/>
    <circle cx="-10" cy="22" r="4.5" fill="#F5B82E" opacity="0.75"/>
    <circle cx="35" cy="15" r="3.5" fill="#F5B82E" opacity="0.65"/>
    <circle cx="-30" cy="5" r="3" fill="#F5B82E" opacity="0.6"/>
    <!-- Satellite orbit arc -->
    <path d="M-75,-35 C-40,-55 40,-55 75,-35" fill="none" stroke="#FAF6E8" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
    <!-- Satellite -->
    <rect x="40" y="-52" width="10" height="6" rx="1" fill="#FAF6E8" opacity="0.6"/>
    <line x1="35" y1="-49" x2="40" y2="-49" stroke="#FAF6E8" stroke-width="2" opacity="0.5"/>
    <line x1="50" y1="-49" x2="55" y2="-49" stroke="#FAF6E8" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#FAF6E8" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#2B2B2B" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Data Lab</text>
</svg>