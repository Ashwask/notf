<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#C45A2A"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#F5B82E" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#2F4A2C" opacity="0.08"/>
  <!-- Paint brush -->
  <g transform="translate(200, 140)">
    <!-- Brush handle -->
    <rect x="-8" y="20" width="16" height="80" rx="4" fill="#FAF6E8" opacity="0.7"/>
    <!-- Brush bristles -->
    <rect x="-18" y="-10" width="36" height="35" rx="4" fill="#FAF6E8" opacity="0.85"/>
    <!-- Paint splashes -->
    <circle cx="-50" cy="-30" r="20" fill="#F5B82E" opacity="0.5"/>
    <circle cx="55" cy="-20" r="16" fill="#B9C98A" opacity="0.5"/>
    <circle cx="-30" cy="-60" r="14" fill="#3F5F7A" opacity="0.45"/>
    <circle cx="40" cy="-55" r="12" fill="#FAF6E8" opacity="0.35"/>
    <circle cx="0" cy="-75" r="10" fill="#F5B82E" opacity="0.4"/>
    <circle cx="-60" cy="5" r="10" fill="#2F4A2C" opacity="0.3"/>
    <circle cx="70" cy="10" r="8" fill="#B9C98A" opacity="0.4"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#F5B82E" opacity="0.2" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#FAF6E8" opacity="0.15"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Namma Banna</text>
</svg>