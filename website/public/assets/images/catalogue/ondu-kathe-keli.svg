<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#F5B82E"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#C45A2A" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#2F4A2C" opacity="0.08"/>
  <!-- Speech bubbles / Storytelling icon -->
  <g transform="translate(200, 145)">
    <!-- Large speech bubble (left) -->
    <g transform="translate(-20, -10)">
      <rect x="-55" y="-50" width="100" height="70" rx="14" fill="#FAF6E8" opacity="0.8"/>
      <polygon points="-20,20 -10,40 5,20" fill="#FAF6E8" opacity="0.8"/>
      <!-- Dots inside bubble -->
      <circle cx="-20" cy="-15" r="5" fill="#F5B82E" opacity="0.5"/>
      <circle cx="0" cy="-15" r="5" fill="#F5B82E" opacity="0.5"/>
      <circle cx="20" cy="-15" r="5" fill="#F5B82E" opacity="0.5"/>
    </g>
    <!-- Smaller speech bubble (right, overlapping) -->
    <g transform="translate(30, 20)">
      <rect x="-35" y="-30" width="80" height="55" rx="12" fill="#FAF6E8" opacity="0.6"/>
      <polygon points="30,25 20,40 40,25" fill="#FAF6E8" opacity="0.6"/>
      <!-- Lines inside bubble -->
      <line x1="-18" y1="-10" x2="28" y2="-10" stroke="#F5B82E" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
      <line x1="-18" y1="5" x2="18" y2="5" stroke="#F5B82E" stroke-width="3" opacity="0.35" stroke-linecap="round"/>
    </g>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#2F4A2C" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#2B2B2B" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Ondu Kathe Keli</text>
</svg>