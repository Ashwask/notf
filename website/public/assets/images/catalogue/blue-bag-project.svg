<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#3F5F7A"/>
  <!-- Geometric background shapes -->
  <circle cx="50" cy="60" r="80" fill="#2F4A2C" opacity="0.12"/>
  <circle cx="360" cy="310" r="70" fill="#B9C98A" opacity="0.1"/>
  <!-- Bag shape -->
  <g transform="translate(200, 145)">
    <!-- Bag handles -->
    <path d="M-20,-55 C-20,-80 20,-80 20,-55" fill="none" stroke="#FAF6E8" stroke-width="5" opacity="0.7" stroke-linecap="round"/>
    <!-- Bag body -->
    <path d="M-45,-35 L-40,55 C-38,65 38,65 40,55 L45,-35 Z" fill="#FAF6E8" opacity="0.8"/>
    <!-- Recycle symbol on bag -->
    <g transform="translate(0, 10)">
      <!-- Three arrows forming triangle -->
      <path d="M0,-22 L-8,-8 L-3,-8 L-3,0 L3,0 L3,-8 L8,-8 Z" fill="#3F5F7A" opacity="0.5" transform="rotate(0 0 0)"/>
      <path d="M0,-22 L-8,-8 L-3,-8 L-3,0 L3,0 L3,-8 L8,-8 Z" fill="#3F5F7A" opacity="0.5" transform="rotate(120 0 0)"/>
      <path d="M0,-22 L-8,-8 L-3,-8 L-3,0 L3,0 L3,-8 L8,-8 Z" fill="#3F5F7A" opacity="0.5" transform="rotate(240 0 0)"/>
    </g>
  </g>
  <!-- Small decorative shapes -->
  <rect x="300" y="80" width="10" height="10" fill="#F5B82E" opacity="0.2" transform="rotate(45 305 85)"/>
  <circle cx="100" cy="280" r="5" fill="#FAF6E8" opacity="0.2"/>
  <polygon points="80,160 88,145 96,160" fill="#FAF6E8" opacity="0.12"/>
  <circle cx="330" cy="200" r="4" fill="#B9C98A" opacity="0.15"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Blue Bag Project</text>
</svg>