<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#F5B82E"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#C45A2A" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#2F4A2C" opacity="0.08"/>
  <!-- Megaphone / Bullhorn -->
  <g transform="translate(200, 150)">
    <!-- Main cone -->
    <path d="M-10,-40 L60,-70 L60,70 L-10,40 Z" fill="#FAF6E8" opacity="0.8"/>
    <!-- Handle end -->
    <rect x="-30" y="-25" width="25" height="50" rx="6" fill="#FAF6E8" opacity="0.7"/>
    <!-- Sound waves -->
    <path d="M70,-30 C90,-15 90,15 70,30" fill="none" stroke="#FAF6E8" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
    <path d="M82,-50 C115,-25 115,25 82,50" fill="none" stroke="#FAF6E8" stroke-width="3.5" opacity="0.35" stroke-linecap="round"/>
    <path d="M94,-65 C135,-35 135,35 94,65" fill="none" stroke="#FAF6E8" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#2F4A2C" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#2B2B2B" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Noisewatchers</text>
</svg>