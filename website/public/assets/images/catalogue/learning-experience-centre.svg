<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2F4A2C"/>
      <stop offset="100%" stop-color="#3F5F7A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#bg)"/>
  <!-- Geometric shapes -->
  <circle cx="320" cy="60" r="80" fill="#B9C98A" opacity="0.15"/>
  <circle cx="80" cy="220" r="60" fill="#F5B82E" opacity="0.12"/>
  <rect x="30" y="40" width="120" height="80" rx="8" fill="#FAF6E8" opacity="0.08" transform="rotate(-8 90 80)"/>
  <!-- Book icon -->
  <g transform="translate(160, 90)">
    <path d="M-40,0 C-40,-20 -10,-25 0,-10 C10,-25 40,-20 40,0 L40,60 C40,55 10,50 0,60 C-10,50 -40,55 -40,60 Z" fill="#FAF6E8" opacity="0.9"/>
    <line x1="0" y1="-10" x2="0" y2="60" stroke="#2F4A2C" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Lightbulb accent -->
  <circle cx="260" cy="140" r="20" fill="#F5B82E" opacity="0.7"/>
  <rect x="254" y="160" width="12" height="8" rx="2" fill="#F5B82E" opacity="0.5"/>
  <!-- Small decorative shapes -->
  <rect x="50" y="140" width="16" height="16" fill="#B9C98A" opacity="0.3" transform="rotate(45 58 148)"/>
  <circle cx="340" cy="200" r="8" fill="#C45A2A" opacity="0.25"/>
  <polygon points="300,230 310,210 320,230" fill="#F5B82E" opacity="0.2"/>
</svg>