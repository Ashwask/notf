<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#2F4A2C"/>
  <circle cx="340" cy="60" r="80" fill="#B9C98A" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#F5B82E" opacity="0.08"/>
  <!-- Flower/leaf composting icon -->
  <g transform="translate(200, 140)">
    <!-- Flower -->
    <circle cx="0" cy="-30" r="12" fill="#FAF6E8" opacity="0.6"/>
    <circle cx="-18" cy="-18" r="12" fill="#FAF6E8" opacity="0.5"/>
    <circle cx="18" cy="-18" r="12" fill="#FAF6E8" opacity="0.5"/>
    <circle cx="-18" cy="-42" r="12" fill="#FAF6E8" opacity="0.5"/>
    <circle cx="18" cy="-42" r="12" fill="#FAF6E8" opacity="0.5"/>
    <circle cx="0" cy="-30" r="6" fill="#F5B82E" opacity="0.7"/>
    <!-- Arrow down -->
    <path d="M0,-5 L0,25" stroke="#FAF6E8" stroke-width="3" opacity="0.4"/>
    <path d="M-8,18 L0,28 L8,18" fill="#FAF6E8" opacity="0.4"/>
    <!-- Compost pile -->
    <ellipse cx="0" cy="50" rx="45" ry="20" fill="#FAF6E8" opacity="0.7"/>
    <ellipse cx="0" cy="45" rx="35" ry="15" fill="#B9C98A" opacity="0.5"/>
    <!-- Small sprout from compost -->
    <path d="M0,35 L0,20" stroke="#B9C98A" stroke-width="2" opacity="0.8"/>
    <circle cx="-5" cy="22" r="5" fill="#B9C98A" opacity="0.6"/>
    <circle cx="5" cy="18" r="4" fill="#B9C98A" opacity="0.5"/>
  </g>
  <rect x="60" y="90" width="12" height="12" fill="#B9C98A" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#FAF6E8" opacity="0.1"/>
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#FAF6E8" opacity="0.9">Greens &amp; Browns</text>
</svg>
