<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#C45A2A"/>
  <!-- Geometric background shapes -->
  <circle cx="50" cy="50" r="80" fill="#F5B82E" opacity="0.1"/>
  <circle cx="360" cy="320" r="70" fill="#2F4A2C" opacity="0.08"/>
  <!-- Steering wheel -->
  <g transform="translate(200, 145)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#FAF6E8" stroke-width="8" opacity="0.8"/>
    <!-- Inner hub -->
    <circle cx="0" cy="0" r="12" fill="#FAF6E8" opacity="0.7"/>
    <!-- Spokes -->
    <line x1="0" y1="-12" x2="0" y2="-58" stroke="#FAF6E8" stroke-width="6" opacity="0.7" stroke-linecap="round"/>
    <line x1="-10" y1="6" x2="-50" y2="30" stroke="#FAF6E8" stroke-width="6" opacity="0.7" stroke-linecap="round"/>
    <line x1="10" y1="6" x2="50" y2="30" stroke="#FAF6E8" stroke-width="6" opacity="0.7" stroke-linecap="round"/>
    <!-- Motion lines -->
    <path d="M-90,-20 L-75,-20" stroke="#FAF6E8" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
    <path d="M-85,0 L-75,0" stroke="#FAF6E8" stroke-width="3" opacity="0.25" stroke-linecap="round"/>
    <path d="M-90,20 L-75,20" stroke="#FAF6E8" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="310" y="80" width="12" height="12" fill="#F5B82E" opacity="0.2" transform="rotate(45 316 86)"/>
  <circle cx="80" cy="270" r="5" fill="#FAF6E8" opacity="0.2"/>
  <polygon points="330,250 338,235 346,250" fill="#FAF6E8" opacity="0.12"/>
  <circle cx="100" cy="160" r="4" fill="#F5B82E" opacity="0.15"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Wheels of Change</text>
</svg>