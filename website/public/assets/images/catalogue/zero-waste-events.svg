<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#F5B82E"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#C45A2A" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#2F4A2C" opacity="0.08"/>
  <!-- Party / Gathering with Recycle icon -->
  <g transform="translate(200, 150)">
    <!-- Party banner / bunting -->
    <line x1="-65" y1="-60" x2="65" y2="-60" stroke="#FAF6E8" stroke-width="3" opacity="0.5"/>
    <polygon points="-55,-60 -45,-60 -50,-45" fill="#2F4A2C" opacity="0.5"/>
    <polygon points="-30,-60 -20,-60 -25,-45" fill="#C45A2A" opacity="0.5"/>
    <polygon points="-5,-60 5,-60 0,-45" fill="#3F5F7A" opacity="0.5"/>
    <polygon points="20,-60 30,-60 25,-45" fill="#2F4A2C" opacity="0.5"/>
    <polygon points="45,-60 55,-60 50,-45" fill="#C45A2A" opacity="0.5"/>
    <!-- People silhouettes (gathering) -->
    <!-- Person left -->
    <circle cx="-35" cy="5" r="10" fill="#FAF6E8" opacity="0.7"/>
    <path d="M-35,15 C-45,20 -50,40 -48,55 L-22,55 C-20,40 -25,20 -35,15 Z" fill="#FAF6E8" opacity="0.6"/>
    <!-- Person center -->
    <circle cx="0" cy="-5" r="12" fill="#FAF6E8" opacity="0.8"/>
    <path d="M0,7 C-12,14 -18,35 -16,55 L16,55 C18,35 12,14 0,7 Z" fill="#FAF6E8" opacity="0.7"/>
    <!-- Person right -->
    <circle cx="35" cy="5" r="10" fill="#FAF6E8" opacity="0.7"/>
    <path d="M35,15 C25,20 20,40 22,55 L48,55 C50,40 45,20 35,15 Z" fill="#FAF6E8" opacity="0.6"/>
    <!-- Recycle symbol overlay -->
    <g transform="translate(55, -25)">
      <path d="M0,-12 L7,0 L-7,0 Z" fill="#2F4A2C" opacity="0.6"/>
      <path d="M7,0 L14,12 L0,12 Z" fill="#2F4A2C" opacity="0.5"/>
      <path d="M-7,0 L0,12 L-14,12 Z" fill="#2F4A2C" opacity="0.5"/>
    </g>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#2F4A2C" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#2B2B2B" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Zero Waste Events</text>
</svg>