<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#B9C98A"/>
  <!-- Geometric shapes -->
  <circle cx="340" cy="40" r="80" fill="#2F4A2C" opacity="0.1"/>
  <circle cx="50" cy="250" r="60" fill="#F5B82E" opacity="0.12"/>
  <!-- Report card -->
  <g transform="translate(140, 50)">
    <rect x="0" y="0" width="120" height="160" rx="8" fill="#FAF6E8" opacity="0.85"/>
    <!-- Header -->
    <rect x="0" y="0" width="120" height="30" rx="8" fill="#2F4A2C" opacity="0.7"/>
    <rect x="82" y="28" width="38" height="2" rx="1" fill="#2F4A2C" opacity="0"/>
    <!-- Score bars -->
    <rect x="15" y="45" width="70" height="8" rx="4" fill="#B9C98A" opacity="0.6"/>
    <rect x="15" y="60" width="55" height="8" rx="4" fill="#F5B82E" opacity="0.5"/>
    <rect x="15" y="75" width="80" height="8" rx="4" fill="#2F4A2C" opacity="0.4"/>
    <rect x="15" y="90" width="45" height="8" rx="4" fill="#C45A2A" opacity="0.4"/>
    <rect x="15" y="105" width="65" height="8" rx="4" fill="#3F5F7A" opacity="0.4"/>
    <!-- Grade circle -->
    <circle cx="60" cy="140" r="14" fill="#2F4A2C" opacity="0.15"/>
    <text x="60" y="145" text-anchor="middle" fill="#2F4A2C" font-size="14" font-weight="700" opacity="0.6">A</text>
  </g>
  <!-- Leaf -->
  <g transform="translate(80, 120)">
    <path d="M0,0 C18,-35 48,-28 35,0 C22,28 6,22 0,0Z" fill="#2F4A2C" opacity="0.3"/>
    <line x1="2" y1="0" x2="24" y2="-16" stroke="#B9C98A" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Check mark -->
  <g transform="translate(320, 160)">
    <circle cx="0" cy="0" r="16" fill="#2F4A2C" opacity="0.25"/>
    <polyline points="-6,0 -2,5 8,-6" fill="none" stroke="#FAF6E8" stroke-width="2.5" opacity="0.7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Small shapes -->
  <rect x="50" y="60" width="10" height="10" fill="#2F4A2C" opacity="0.15" transform="rotate(45 55 65)"/>
  <circle cx="330" cy="230" r="5" fill="#2F4A2C" opacity="0.15"/>
</svg>