<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#3F5F7A"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#F5B82E" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#2F4A2C" opacity="0.08"/>
  <!-- Chart / Dashboard icon -->
  <g transform="translate(200, 150)">
    <!-- Chart background panel -->
    <rect x="-70" y="-70" width="140" height="120" rx="8" fill="#FAF6E8" opacity="0.15"/>
    <!-- Bar chart bars -->
    <rect x="-50" y="10" width="20" height="40" rx="3" fill="#FAF6E8" opacity="0.8"/>
    <rect x="-20" y="-20" width="20" height="70" rx="3" fill="#FAF6E8" opacity="0.7"/>
    <rect x="10" y="-40" width="20" height="90" rx="3" fill="#FAF6E8" opacity="0.8"/>
    <rect x="40" y="-10" width="20" height="60" rx="3" fill="#FAF6E8" opacity="0.7"/>
    <!-- Trend line -->
    <path d="M-40,20 L-10,-10 L20,-35 L50,0" fill="none" stroke="#FAF6E8" stroke-width="3" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Axis lines -->
    <line x1="-60" y1="55" x2="65" y2="55" stroke="#FAF6E8" stroke-width="2" opacity="0.3"/>
    <line x1="-60" y1="-65" x2="-60" y2="55" stroke="#FAF6E8" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#FAF6E8" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#2B2B2B" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">E-QLT</text>
</svg>