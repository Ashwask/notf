<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#3F5F7A"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#FAF6E8" opacity="0.08"/>
  <circle cx="50" cy="320" r="70" fill="#B9C98A" opacity="0.08"/>
  <!-- People in circle / discussion icon -->
  <g transform="translate(200, 145)">
    <!-- Central discussion circle -->
    <circle cx="0" cy="0" r="30" fill="#FAF6E8" opacity="0.15" stroke="#FAF6E8" stroke-width="2" opacity="0.3"/>
    <!-- Person top -->
    <g transform="translate(0, -55)">
      <circle cx="0" cy="0" r="10" fill="#FAF6E8" opacity="0.8"/>
      <path d="M0,10 C-8,14 -12,24 -10,32 L10,32 C12,24 8,14 0,10 Z" fill="#FAF6E8" opacity="0.65"/>
    </g>
    <!-- Person top-right -->
    <g transform="translate(48, -28)">
      <circle cx="0" cy="0" r="10" fill="#FAF6E8" opacity="0.7"/>
      <path d="M0,10 C-8,14 -12,24 -10,32 L10,32 C12,24 8,14 0,10 Z" fill="#FAF6E8" opacity="0.55"/>
    </g>
    <!-- Person bottom-right -->
    <g transform="translate(48, 28)">
      <circle cx="0" cy="0" r="10" fill="#FAF6E8" opacity="0.7"/>
      <path d="M0,10 C-8,14 -12,24 -10,32 L10,32 C12,24 8,14 0,10 Z" fill="#FAF6E8" opacity="0.55"/>
    </g>
    <!-- Person bottom -->
    <g transform="translate(0, 55)">
      <circle cx="0" cy="0" r="10" fill="#FAF6E8" opacity="0.75"/>
      <path d="M0,10 C-8,14 -12,24 -10,32 L10,32 C12,24 8,14 0,10 Z" fill="#FAF6E8" opacity="0.6"/>
    </g>
    <!-- Person bottom-left -->
    <g transform="translate(-48, 28)">
      <circle cx="0" cy="0" r="10" fill="#FAF6E8" opacity="0.7"/>
      <path d="M0,10 C-8,14 -12,24 -10,32 L10,32 C12,24 8,14 0,10 Z" fill="#FAF6E8" opacity="0.55"/>
    </g>
    <!-- Person top-left -->
    <g transform="translate(-48, -28)">
      <circle cx="0" cy="0" r="10" fill="#FAF6E8" opacity="0.7"/>
      <path d="M0,10 C-8,14 -12,24 -10,32 L10,32 C12,24 8,14 0,10 Z" fill="#FAF6E8" opacity="0.55"/>
    </g>
    <!-- Speech/thought bubbles -->
    <path d="M12,-18 C18,-25 28,-22 25,-15" fill="none" stroke="#FAF6E8" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
    <path d="M-12,18 C-18,25 -28,22 -25,15" fill="none" stroke="#FAF6E8" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
    <circle cx="18" cy="-12" r="3" fill="#F5B82E" opacity="0.4"/>
    <circle cx="-18" cy="12" r="3" fill="#B9C98A" opacity="0.4"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#FAF6E8" opacity="0.12" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#B9C98A" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Climate Chaupal</text>
</svg>