<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#3F5F7A"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#FAF6E8" opacity="0.08"/>
  <circle cx="50" cy="320" r="70" fill="#F5B82E" opacity="0.08"/>
  <!-- Trophy / flag icon -->
  <g transform="translate(200, 145)">
    <!-- Trophy cup -->
    <path d="M-35,-55 L-30,10 L30,10 L35,-55 Z" fill="#FAF6E8" opacity="0.8"/>
    <!-- Trophy rim -->
    <rect x="-40" y="-60" width="80" height="10" rx="3" fill="#FAF6E8" opacity="0.7"/>
    <!-- Trophy handles -->
    <path d="M-35,-40 C-60,-40 -60,0 -35,0" fill="none" stroke="#FAF6E8" stroke-width="5" opacity="0.5" stroke-linecap="round"/>
    <path d="M35,-40 C60,-40 60,0 35,0" fill="none" stroke="#FAF6E8" stroke-width="5" opacity="0.5" stroke-linecap="round"/>
    <!-- Trophy stem -->
    <rect x="-6" y="10" width="12" height="25" fill="#FAF6E8" opacity="0.7"/>
    <!-- Trophy base -->
    <rect x="-30" y="35" width="60" height="10" rx="3" fill="#FAF6E8" opacity="0.65"/>
    <!-- Star on trophy -->
    <polygon points="0,-35 5,-22 18,-22 8,-14 12,-2 0,-9 -12,-2 -8,-14 -18,-22 -5,-22" fill="#3F5F7A" opacity="0.5"/>
    <!-- Flag accent left -->
    <g transform="translate(-65, -30)">
      <line x1="0" y1="0" x2="0" y2="50" stroke="#FAF6E8" stroke-width="2.5" opacity="0.35"/>
      <polygon points="0,0 22,8 0,16" fill="#FAF6E8" opacity="0.3"/>
    </g>
    <!-- Flag accent right -->
    <g transform="translate(65, -30)">
      <line x1="0" y1="0" x2="0" y2="50" stroke="#FAF6E8" stroke-width="2.5" opacity="0.35"/>
      <polygon points="0,0 -22,8 0,16" fill="#FAF6E8" opacity="0.3"/>
    </g>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#F5B82E" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#FAF6E8" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">CC Challenge</text>
</svg>