<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#3F5F7A"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#FAF6E8" opacity="0.08"/>
  <circle cx="50" cy="320" r="70" fill="#B9C98A" opacity="0.08"/>
  <!-- Book and pencil icon -->
  <g transform="translate(200, 150)">
    <!-- Open book - left page -->
    <path d="M-5,-30 L-5,50 C-25,40 -50,38 -65,42 L-65,-25 C-50,-30 -25,-28 -5,-30 Z" fill="#FAF6E8" opacity="0.75"/>
    <!-- Open book - right page -->
    <path d="M5,-30 L5,50 C25,40 50,38 65,42 L65,-25 C50,-30 25,-28 5,-30 Z" fill="#FAF6E8" opacity="0.65"/>
    <!-- Book spine -->
    <rect x="-5" y="-30" width="10" height="80" rx="2" fill="#FAF6E8" opacity="0.85"/>
    <!-- Text lines on left page -->
    <line x1="-55" y1="-10" x2="-15" y2="-10" stroke="#3F5F7A" stroke-width="2" opacity="0.3"/>
    <line x1="-50" y1="0" x2="-15" y2="0" stroke="#3F5F7A" stroke-width="2" opacity="0.25"/>
    <line x1="-55" y1="10" x2="-20" y2="10" stroke="#3F5F7A" stroke-width="2" opacity="0.3"/>
    <line x1="-48" y1="20" x2="-15" y2="20" stroke="#3F5F7A" stroke-width="2" opacity="0.25"/>
    <!-- Pencil -->
    <g transform="translate(40, -55) rotate(30)">
      <rect x="-3" y="0" width="6" height="50" rx="1" fill="#F5B82E" opacity="0.8"/>
      <polygon points="-3,50 3,50 0,60" fill="#FAF6E8" opacity="0.7"/>
      <rect x="-3" y="0" width="6" height="6" rx="1" fill="#C45A2A" opacity="0.6"/>
    </g>
    <!-- Small leaf accent -->
    <path d="M-45,-50 C-35,-65 -20,-55 -30,-40" fill="#B9C98A" opacity="0.5"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#FAF6E8" opacity="0.12" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#B9C98A" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Green Workers Literacy</text>
</svg>