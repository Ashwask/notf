<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#2F4A2C"/>
  <!-- Geometric shapes -->
  <circle cx="340" cy="60" r="90" fill="#B9C98A" opacity="0.12"/>
  <circle cx="40" cy="240" r="50" fill="#F5B82E" opacity="0.1"/>
  <!-- School building -->
  <g transform="translate(160, 100)">
    <rect x="-50" y="0" width="100" height="70" rx="4" fill="#FAF6E8" opacity="0.2"/>
    <polygon points="-60,-10 0,-40 60,-10" fill="#FAF6E8" opacity="0.25"/>
    <rect x="-15" y="30" width="30" height="40" rx="2" fill="#B9C98A" opacity="0.4"/>
    <rect x="-40" y="15" width="18" height="18" rx="2" fill="#FAF6E8" opacity="0.15"/>
    <rect x="22" y="15" width="18" height="18" rx="2" fill="#FAF6E8" opacity="0.15"/>
  </g>
  <!-- Recycling symbol -->
  <g transform="translate(300, 170)">
    <path d="M0,-22 L12,0 L-12,0 Z" fill="none" stroke="#B9C98A" stroke-width="3" opacity="0.6"/>
    <path d="M-5,-5 A18,18 0 0,1 5,-5" fill="none" stroke="#B9C98A" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  </g>
  <!-- Leaf -->
  <g transform="translate(80, 120)">
    <path d="M0,0 C15,-30 40,-25 30,0 C20,25 5,20 0,0Z" fill="#B9C98A" opacity="0.5"/>
    <line x1="0" y1="0" x2="20" y2="-12" stroke="#2F4A2C" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Small shapes -->
  <rect x="280" y="40" width="10" height="10" fill="#F5B82E" opacity="0.25" transform="rotate(45 285 45)"/>
  <circle cx="120" cy="60" r="4" fill="#FAF6E8" opacity="0.15"/>
</svg>