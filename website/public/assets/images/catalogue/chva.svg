<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#C45A2A"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#F5B82E" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#2F4A2C" opacity="0.08"/>
  <!-- Thermometer with heat waves -->
  <g transform="translate(200, 150)">
    <!-- Thermometer body -->
    <rect x="-12" y="-70" width="24" height="100" rx="12" fill="#FAF6E8" opacity="0.8"/>
    <!-- Thermometer bulb -->
    <circle cx="0" cy="45" r="22" fill="#FAF6E8" opacity="0.8"/>
    <!-- Mercury -->
    <rect x="-6" y="-30" width="12" height="75" rx="6" fill="#C45A2A" opacity="0.5"/>
    <circle cx="0" cy="45" r="14" fill="#C45A2A" opacity="0.5"/>
    <!-- Heat waves on left -->
    <path d="M-40,-50 C-32,-40 -48,-30 -40,-20" fill="none" stroke="#FAF6E8" stroke-width="3.5" opacity="0.4" stroke-linecap="round"/>
    <path d="M-55,-45 C-47,-35 -63,-25 -55,-15" fill="none" stroke="#FAF6E8" stroke-width="3" opacity="0.25" stroke-linecap="round"/>
    <!-- Heat waves on right -->
    <path d="M40,-50 C48,-40 32,-30 40,-20" fill="none" stroke="#FAF6E8" stroke-width="3.5" opacity="0.4" stroke-linecap="round"/>
    <path d="M55,-45 C63,-35 47,-25 55,-15" fill="none" stroke="#FAF6E8" stroke-width="3" opacity="0.25" stroke-linecap="round"/>
    <!-- Temperature marks -->
    <line x1="18" y1="-50" x2="28" y2="-50" stroke="#FAF6E8" stroke-width="2" opacity="0.5"/>
    <line x1="18" y1="-30" x2="28" y2="-30" stroke="#FAF6E8" stroke-width="2" opacity="0.5"/>
    <line x1="18" y1="-10" x2="28" y2="-10" stroke="#FAF6E8" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#FAF6E8" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#2B2B2B" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">CHVA</text>
</svg>