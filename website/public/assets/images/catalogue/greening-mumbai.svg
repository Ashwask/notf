<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#2F4A2C"/>
  <!-- Geometric background shapes -->
  <circle cx="340" cy="60" r="80" fill="#B9C98A" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#FAF6E8" opacity="0.08"/>
  <!-- Plant / Leaf growing -->
  <g transform="translate(200, 155)">
    <!-- Soil / ground -->
    <ellipse cx="0" cy="55" rx="50" ry="10" fill="#FAF6E8" opacity="0.25"/>
    <!-- Stem -->
    <path d="M0,55 C0,30 0,10 -5,-25" fill="none" stroke="#FAF6E8" stroke-width="4" opacity="0.7" stroke-linecap="round"/>
    <!-- Large leaf left -->
    <path d="M-5,-25 C-50,-50 -55,-15 -5,-5" fill="#B9C98A" opacity="0.6"/>
    <path d="M-5,-25 C-30,-20 -20,-10 -5,-5" fill="none" stroke="#FAF6E8" stroke-width="1.5" opacity="0.3"/>
    <!-- Large leaf right -->
    <path d="M-2,-45 C45,-75 55,-35 0,-25" fill="#B9C98A" opacity="0.55"/>
    <path d="M-2,-45 C25,-45 20,-30 0,-25" fill="none" stroke="#FAF6E8" stroke-width="1.5" opacity="0.3"/>
    <!-- Small sprouting leaf top -->
    <path d="M-5,-25 C-25,-65 5,-65 -3,-40" fill="#B9C98A" opacity="0.5"/>
    <!-- Small new leaf bud -->
    <path d="M-3,15 C-30,0 -25,25 -3,20" fill="#B9C98A" opacity="0.45"/>
    <!-- Growth sparkles -->
    <circle cx="30" cy="-55" r="3" fill="#F5B82E" opacity="0.5"/>
    <circle cx="-35" cy="-50" r="2.5" fill="#F5B82E" opacity="0.4"/>
    <circle cx="20" cy="-10" r="2" fill="#F5B82E" opacity="0.35"/>
  </g>
  <!-- Small decorative shapes -->
  <rect x="60" y="90" width="12" height="12" fill="#FAF6E8" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#2B2B2B" opacity="0.1"/>
  <!-- Project name -->
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Greening Mumbai</text>
</svg>