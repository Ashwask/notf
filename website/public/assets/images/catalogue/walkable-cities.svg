<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380">
  <rect width="400" height="380" fill="#3F5F7A"/>
  <circle cx="340" cy="60" r="80" fill="#F5B82E" opacity="0.1"/>
  <circle cx="50" cy="320" r="70" fill="#2F4A2C" opacity="0.08"/>
  <!-- Walking person + footpath -->
  <g transform="translate(200, 135)">
    <!-- Person walking -->
    <circle cx="-20" cy="-45" r="12" fill="#FAF6E8" opacity="0.8"/>
    <path d="M-20,-30 L-20,5" stroke="#FAF6E8" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <path d="M-20,-20 L-35,-8" stroke="#FAF6E8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <path d="M-20,-20 L-5,-10" stroke="#FAF6E8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <path d="M-20,5 L-30,30" stroke="#FAF6E8" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M-20,5 L-10,30" stroke="#FAF6E8" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Footpath/road -->
    <rect x="15" y="20" width="60" height="8" rx="3" fill="#FAF6E8" opacity="0.5"/>
    <rect x="25" y="35" width="50" height="8" rx="3" fill="#FAF6E8" opacity="0.35"/>
    <rect x="35" y="50" width="40" height="8" rx="3" fill="#FAF6E8" opacity="0.25"/>
    <!-- Map pin -->
    <circle cx="45" cy="-10" r="10" fill="#FAF6E8" opacity="0.6"/>
    <path d="M45,-10 L45,10" stroke="#FAF6E8" stroke-width="2" opacity="0.4"/>
    <circle cx="45" cy="-10" r="4" fill="#3F5F7A" opacity="0.5"/>
  </g>
  <rect x="60" y="90" width="12" height="12" fill="#F5B82E" opacity="0.15" transform="rotate(45 66 96)"/>
  <circle cx="120" cy="280" r="5" fill="#FAF6E8" opacity="0.25"/>
  <polygon points="320,260 328,245 336,260" fill="#FAF6E8" opacity="0.15"/>
  <circle cx="330" cy="180" r="4" fill="#FAF6E8" opacity="0.1"/>
  <text x="200" y="340" text-anchor="middle" font-family="'Okta Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#FAF6E8" opacity="0.9">Walkable Cities</text>
</svg>
